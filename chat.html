<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#075e54;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.logout{
background:red;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.chatArea{
flex:1;
overflow-y:auto;
padding:15px;
}

.admin{
background:white;
padding:10px 14px;
border-radius:12px;
margin-bottom:12px;
max-width:80%;
width:fit-content;
}

.user{
background:#dcf8c6;
padding:10px 14px;
border-radius:12px;
margin-left:auto;
margin-bottom:12px;
max-width:80%;
width:fit-content;
}

.bottom{
padding:10px;
background:white;
display:flex;
gap:8px;
}

.bottom input{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
}

.bottom button{
background:#25d366;
color:white;
border:none;
padding:12px 18px;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

.whatsapp{
display:block;
text-align:center;
background:#25d366;
color:white;
text-decoration:none;
padding:14px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="header">

<span>Africa Enterprise Challenge Funds</span>

<button class="logout" id="logoutBtn">
Logout
</button>

</div>

<div class="chatArea" id="chatArea">

<div class="admin">
Welcome 👋<br>
How can we help you today?
</div>

</div>

<div class="bottom">

<input
id="msg"
placeholder="Type a message...">

<button id="sendBtn">
Send
</button>

</div>

<a class="whatsapp"
href="https://wa.me/254734081951?text=Hello!%20I'd%20like%20this%20Programme.">

💬 Chat us via WhatsApp

</a>

<script>

const phone=localStorage.getItem("loggedUser");

if(!phone){
location.href="index.html";
}

document.getElementById("logoutBtn").onclick=()=>{

localStorage.removeItem("loggedUser");

location.href="index.html";

};

const area=document.getElementById("chatArea");

document.getElementById("sendBtn").onclick=()=>{

const box=document.getElementById("msg");

const text=box.value.trim();

if(text=="") return;

const div=document.createElement("div");

div.className="user";

div.innerText=text;

area.appendChild(div);

box.value="";

area.scrollTop=area.scrollHeight;

};

</script>

</body>
</html>
