<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Chat</title>

<link rel="stylesheet" href="style.css">

<style>

/* Chat layout (WhatsApp style) */

.chat-container{
width:100%;
max-width:420px;
height:100vh;
margin:auto;
display:flex;
flex-direction:column;
background:#e5ddd5;
}

.chat-header{
background:#075E54;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.logout{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:10px;
font-size:14px;
word-wrap:break-word;
}

.me{
background:#DCF8C6;
align-self:flex-end;
}

.other{
background:white;
align-self:flex-start;
}

.chat-input{
display:flex;
padding:10px;
background:white;
gap:8px;
}

.chat-input input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.chat-input button{
background:#25D366;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.whatsapp-link{
text-align:center;
padding:10px;
background:white;
}

.whatsapp-link a{
background:#25D366;
color:white;
padding:10px;
display:block;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="chat-header">

<span>Support Chat</span>

<button class="logout" id="logoutBtn">Logout</button>

</div>

<div class="messages" id="messages"></div>

<div class="chat-input">

<input type="text" id="messageInput" placeholder="Type message...">

<button id="sendBtn">Send</button>

</div>

<div class="whatsapp-link">

<a href="https://wa.me/254734081951?text=Hello!%20I'd%20like%20this%20Programme." target="_blank">
Chat us via WhatsApp
</a>

</div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
