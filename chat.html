<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
height:60px;
background:#075E54;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
font-size:18px;
font-weight:bold;
}

.logout{
background:#d32f2f;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.chatArea{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.admin{
background:white;
padding:10px;
border-radius:12px;
max-width:80%;
align-self:flex-start;
}

.user{
background:#DCF8C6;
padding:10px;
border-radius:12px;
max-width:80%;
align-self:flex-end;
}

.bottom{
display:flex;
padding:10px;
gap:8px;
background:white;
}

#msg{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
}

#photo{
display:none;
}

.photoBtn{
background:#2196F3;
color:white;
padding:12px;
border-radius:50%;
cursor:pointer;
}

#sendBtn{
background:#25D366;
color:white;
border:none;
padding:12px 20px;
border-radius:25px;
cursor:pointer;
}

.whatsapp{
background:#25D366;
color:white;
text-align:center;
padding:14px;
text-decoration:none;
font-weight:bold;
display:block;
}

</style>

</head>

<body>

<div class="header">

<span>Africa Enterprise Challenge Funds</span>

<button class="logout" id="logoutBtn">
Logout
</button>

</div>

<div id="chatArea" class="chatArea">

<div class="admin">
Welcome 👋<br>
How can we help you today?
</div>

</div>

<div class="bottom">

<label class="photoBtn" for="photo">📷</label>

<input
type="file"
id="photo"
accept="image/*">

<input
id="msg"
placeholder="Type a message...">

<button id="sendBtn">
Send
</button>

</div>

<a
class="whatsapp"
href="https://wa.me/254734081951?text=Hello!%20I'd%20like%20this%20Programme.">

💬 Chat us via WhatsApp

<script type="module">

import { db } from "./firebase.js";

import {
collection,
query,
orderBy,
onSnapshot,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const phone = localStorage.getItem("loggedUser");

if(!phone){
location.href="index.html";
}

const chatArea = document.getElementById("chatArea");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

document.getElementById("logoutBtn").onclick = () => {
localStorage.removeItem("loggedUser");
location.href="index.html";
};

const messagesRef = collection(db,"chats",phone,"messages");

function showMessage(text,sender){

const div=document.createElement("div");

div.className = sender==="user" ? "user" : "admin";

div.textContent=text;

chatArea.appendChild(div);

chatArea.scrollTop=chatArea.scrollHeight;

}

const q=query(messagesRef,orderBy("time"));

onSnapshot(q,(snapshot)=>{

chatArea.innerHTML="";

snapshot.forEach((d)=>{

const data=d.data();

showMessage(data.text,data.sender);

});

});

sendBtn.onclick = async ()=>{

const text=msg.value.trim();

if(text==="") return;

await addDoc(messagesRef,{
sender:"user",
text:text,
time:serverTimestamp()
});

msg.value="";

};

msg.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){

sendBtn.click();

}

});

</script>

</body>
</html></a>
