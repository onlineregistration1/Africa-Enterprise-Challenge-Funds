<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Chat</title>

<link rel="stylesheet" href="style.css">

<style>

body{

margin:0;
background:#ece5dd;
font-family:Arial,Helvetica,sans-serif;

}

.chatContainer{

width:100%;
max-width:420px;
height:100vh;
margin:auto;
display:flex;
flex-direction:column;
background:white;

}

.topBar{

background:#075E54;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
font-size:18px;

}

.logoutBtn{

background:red;
border:none;
color:white;
padding:7px 12px;
border-radius:6px;
font-size:13px;
cursor:pointer;

}

.messages{

flex:1;
overflow-y:auto;
padding:12px;
background:#ece5dd;

}

.message{

max-width:80%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
word-wrap:break-word;
font-size:15px;

}

.user{

background:#DCF8C6;
margin-left:auto;

}

.admin{

background:white;
margin-right:auto;

}

.bottom{

padding:10px;
background:white;
border-top:1px solid #ddd;

}

.inputRow{

display:flex;
gap:8px;

}

#messageInput{

flex:1;
padding:12px;
border-radius:8px;
border:1px solid #bbb;
font-size:16px;

}

#sendBtn{

background:#25D366;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;

}

.whatsappBtn{

display:block;
margin-top:10px;
background:#25D366;
color:white;
text-align:center;
padding:12px;
border-radius:8px;
text-decoration:none;
font-weight:bold;

}

</style>

</head>

<body>

<div class="chatContainer">

<div class="topBar">

<span>Support Chat</span>

<button
class="logoutBtn"
id="logoutBtn">

Logout

</button>

</div>

<div
class="messages"
id="messages">

</div>

<div class="bottom">

<div class="inputRow">

<input
type="text"
id="messageInput"
placeholder="Type your message...">

<button
id="sendBtn">

Send

</button>

</div>

<a
class="whatsappBtn"
href="https://wa.me/254734081951?text=Hello!%20I'd%20like%20this%20Programme."
target="_blank">

💬 Chat us via WhatsApp

</a>

</div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
