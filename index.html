<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AEF Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Auth -->
  <div id="authScreen" class="screen">
    <h2 id="authTitle">Welcome</h2>
    <input type="tel" id="phone" placeholder="+2665... phone" inputmode="tel">
    <div class="pwd-wrap">
      <input type="password" id="pwd" placeholder="Password">
      <span class="eye" onclick="togglePwd('pwd')">👁️</span>
    </div>
    <div class="pwd-wrap" id="repWrap">
      <input type="password" id="repPwd" placeholder="Re-enter Password">
      <span class="eye" onclick="togglePwd('repPwd')">👁️</span>
    </div>
    <button id="authBtn">Continue</button>
    <p id="authMsg"></p>
  </div>

  <!-- Chat -->
  <div id="chatScreen" class="screen hidden">
    <header>
      <span id="chatHead">Chat</span>
      <button id="logoutBtn" class="red small">Logout</button>
    </header>

    <div id="chatBox"></div>

    <a class="waBtn" href="https://wa.me/254734081951?text=Hello!%20I'd%20like%20this%20Programme." target="_blank">Chat us via WhatsApp</a>

    <div id="inputWrap">
      <div id="previewBar"></div>
      <div class="row">
        <label class="attachBtn">+
          <input type="file" id="imgInput" accept="image/*" hidden>
        </label>
        <input type="text" id="msgInput" placeholder="Type a message" autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

</div>
<script type="module" src="app.js"></script>
<script>window.togglePwd=id=>{let e=document.getElementById(id);e.type=e.type==='password'?'text':'password';}</script>
</body>
</html>
