<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --green: #25D366;
    --dark-green: #128C7E;
    --teal: #075E54;
    --chat-bg: #0d1117;
    --header-bg: #1a1f2e;
    --sent-bg: #1a6b9a;
    --received-bg: #1e2635;
    --text-primary: #e9edef;
    --text-secondary: #8696a0;
    --border: #2a3441;
    --input-bg: #1e2635;
    --red: #e53935;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--chat-bg);
    color: var(--text-primary);
  }

  /* ===== AUTH SCREENS ===== */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 24px;
    background: linear-gradient(135deg, #075E54 0%, #0d1117 60%);
  }

  .auth-logo {
    width: 80px;
    height: 80px;
    background: var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 36px;
  }

  .auth-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .auth-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 32px;
    text-align: center;
  }

  .auth-btn {
    width: 100%;
    max-width: 320px;
    padding: 15px;
    border-radius: 28px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }

  .auth-btn:active { opacity: 0.85; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-secondary { background: transparent; color: var(--green); border: 2px solid var(--green); }

  /* ===== FORM SCREENS ===== */
  #login-screen, #signup-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: var(--chat-bg);
    padding: 0;
  }

  .form-header {
    background: var(--teal);
    padding: 16px 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .form-header h2 { font-size: 18px; color: #fff; font-weight: 600; }

  .form-body {
    flex: 1;
    padding: 24px 20px;
    overflow-y: auto;
  }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block;
    font-size: 13px;
    color: var(--green);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-input {
    width: 100%;
    background: var(--input-bg);
    border: none;
    border-bottom: 2px solid var(--border);
    padding: 12px 44px 12px 12px;
    color: var(--text-primary);
    font-size: 16px;
    border-radius: 4px 4px 0 0;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-bottom-color: var(--green); }
  .form-input::placeholder { color: var(--text-secondary); }

  .input-wrap { position: relative; }

  .eye-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }

  .form-submit {
    width: 100%;
    padding: 15px;
    background: var(--green);
    border: none;
    border-radius: 28px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .form-submit:active { opacity: 0.85; }

  .form-error {
    background: rgba(229, 57, 53, 0.15);
    border: 1px solid rgba(229, 57, 53, 0.4);
    color: #ff6b6b;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .form-info {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 16px;
  }

  /* ===== CHAT SCREEN ===== */
  #chat-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--chat-bg);
  }

  /* Header */
  .chat-header {
    background: var(--header-bg);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 52px;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .user-avatar {
    width: 36px;
    height: 36px;
    background: var(--dark-green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .user-phone {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .user-status {
    font-size: 11px;
    color: var(--green);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .wa-btn {
    background: var(--green);
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    text-decoration: none;
    white-space: nowrap;
  }

  .logout-btn {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Chat messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 10px 10px 6px;
    background: var(--chat-bg);
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Date divider */
  .date-divider {
    text-align: center;
    margin: 12px 0;
  }

  .date-divider span {
    background: var(--header-bg);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 10px;
  }

  /* Message bubbles */
  .msg-row {
    display: flex;
    margin-bottom: 2px;
    padding: 1px 0;
  }

  .msg-row.sent { justify-content: flex-end; }
  .msg-row.received { justify-content: flex-start; }

  .msg-bubble {
    max-width: 75%;
    padding: 7px 10px 4px;
    border-radius: 8px;
    position: relative;
    word-wrap: break-word;
    min-width: 60px;
  }

  .msg-row.sent .msg-bubble {
    background: var(--sent-bg);
    border-bottom-right-radius: 2px;
  }

  .msg-row.received .msg-bubble {
    background: var(--received-bg);
    border-bottom-left-radius: 2px;
  }

  .msg-text {
    font-size: 15px;
    line-height: 1.4;
    color: var(--text-primary);
  }

  .msg-unsent {
    font-size: 13px;
    color: var(--text-secondary);
    font-style: italic;
  }

  .msg-meta {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 3px;
    margin-top: 2px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-secondary);
  }

  .msg-tick { font-size: 12px; color: var(--green); }

  .empty-chat {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-secondary);
    text-align: center;
    padding: 20px;
  }

  .empty-chat-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-chat p { font-size: 14px; line-height: 1.5; }

  /* Input area */
  .chat-input-area {
    background: var(--header-bg);
    border-top: 1px solid var(--border);
    padding: 8px 10px;
    flex-shrink: 0;
    z-index: 10;
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .msg-input-wrap {
    flex: 1;
    background: var(--input-bg);
    border-radius: 22px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    min-height: 44px;
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.4;
    resize: none;
    max-height: 100px;
    min-height: 22px;
    font-family: inherit;
    overflow-y: auto;
  }

  #msg-input::placeholder { color: var(--text-secondary); }

  .send-btn {
    width: 44px;
    height: 44px;
    background: var(--green);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .send-btn:active { opacity: 0.85; }

  /* Loading */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">💬</div>
  <div class="auth-title">Chat App</div>
  <div class="auth-subtitle">Connect with support instantly</div>
  <button class="auth-btn btn-primary" onclick="showLogin()">Log In</button>
  <button class="auth-btn btn-secondary" onclick="showSignup()">Create Account</button>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none;flex-direction:column;">
  <div class="form-header">
    <button class="back-btn" onclick="showAuth()">&#8592;</button>
    <h2>Log In</h2>
  </div>
  <div class="form-body">
    <div class="form-error" id="login-error"></div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-wrap">
        <input type="tel" class="form-input" id="login-phone" placeholder="e.g. 0712345678" autocomplete="tel">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" class="form-input" id="login-pass" placeholder="Enter password" autocomplete="current-password">
        <button class="eye-btn" onclick="toggleEye('login-pass', this)">👁️</button>
      </div>
    </div>
    <button class="form-submit" onclick="doLogin()">Log In</button>
    <p class="form-info">No account? <span style="color:var(--green);cursor:pointer;" onclick="showSignup()">Create one</span></p>
  </div>
</div>

<!-- SIGNUP SCREEN -->
<div id="signup-screen" style="display:none;flex-direction:column;">
  <div class="form-header">
    <button class="back-btn" onclick="showAuth()">&#8592;</button>
    <h2>Create Account</h2>
  </div>
  <div class="form-body">
    <div class="form-error" id="signup-error"></div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-wrap">
        <input type="tel" class="form-input" id="signup-phone" placeholder="e.g. 0712345678" autocomplete="tel">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" class="form-input" id="signup-pass" placeholder="Create password" autocomplete="new-password">
        <button class="eye-btn" onclick="toggleEye('signup-pass', this)">👁️</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="input-wrap">
        <input type="password" class="form-input" id="signup-pass2" placeholder="Re-enter password" autocomplete="new-password">
        <button class="eye-btn" onclick="toggleEye('signup-pass2', this)">👁️</button>
      </div>
    </div>
    <button class="form-submit" onclick="doSignup()">Create Account</button>
    <p class="form-info">Already have an account? <span style="color:var(--green);cursor:pointer;" onclick="showLogin()">Log in</span></p>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen" style="display:none;">
  <div class="chat-header">
    <div class="header-left">
      <div class="user-avatar" id="user-avatar">U</div>
      <div>
        <div class="user-phone" id="header-phone">Loading...</div>
        <div class="user-status">Support Chat</div>
      </div>
    </div>
    <div class="header-right">
      <a href="https://wa.me/254734081951?text=Hello!%20I'd%20like%20this%20Programme." 
         target="_blank" class="wa-btn">
        <span>📲</span> WhatsApp
      </a>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="empty-chat" id="empty-chat">
      <div class="empty-chat-icon">💬</div>
      <p>No messages yet.<br>Send your first message below!</p>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="input-row">
      <div class="msg-input-wrap">
        <textarea id="msg-input" placeholder="Type a message..." rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading" style="display:none;">
  <div class="spinner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  addDoc,
  getDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  updateDoc,
  getDocs,
  where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
  authDomain: "african-enterprise-challenge-f.firebaseapp.com",
  projectId: "african-enterprise-challenge-f",
  storageBucket: "african-enterprise-challenge-f.firebasestorage.app",
  messagingSenderId: "85146331644",
  appId: "1:85146331644:web:b28599e0c8b75498fe6a79",
  measurementId: "G-6C670QY54S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentPhone = null;
let chatUnsub = null;
let lastDateShown = null;

// Expose to global
window._auth = auth;
window._db = db;
window._signOut = signOut;
window._currentUser = () => currentUser;
window._currentPhone = () => currentPhone;
window._chatUnsub = () => chatUnsub;

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    // Get phone from Firestore users doc
    const uDoc = await getDoc(doc(db, 'users', user.uid));
    if (uDoc.exists()) {
      currentPhone = uDoc.data().phone;
    } else {
      currentPhone = user.email.replace('@chat.app','');
    }
    showChatScreen();
  } else {
    currentUser = null;
    currentPhone = null;
    showAuth();
  }
});

// ===== PHONE TO EMAIL HELPER =====
function phoneToEmail(phone) {
  const clean = phone.replace(/\s+/g, '').replace(/[^0-9+]/g, '');
  return clean + '@chat.app';
}

// ===== SIGNUP =====
window.doSignup = async function() {
  const phone = document.getElementById('signup-phone').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const pass2 = document.getElementById('signup-pass2').value;
  const errEl = document.getElementById('signup-error');

  errEl.style.display = 'none';

  if (!phone) return showErr(errEl, 'Enter your phone number');
  if (pass.length < 6) return showErr(errEl, 'Password must be at least 6 characters');
  if (pass !== pass2) return showErr(errEl, 'Passwords do not match');

  showLoading(true);
  try {
    const email = phoneToEmail(phone);
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db, 'users', cred.user.uid), {
      phone: phone,
      uid: cred.user.uid,
      createdAt: serverTimestamp()
    });
    // Offer to save password
  } catch (e) {
    showLoading(false);
    if (e.code === 'auth/email-already-in-use') {
      showErr(errEl, 'This phone number already has an account. Please log in.');
    } else {
      showErr(errEl, 'Error: ' + e.message);
    }
  }
};

// ===== LOGIN =====
window.doLogin = async function() {
  const phone = document.getElementById('login-phone').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');

  errEl.style.display = 'none';

  if (!phone) return showErr(errEl, 'Enter your phone number');
  if (!pass) return showErr(errEl, 'Enter your password');

  showLoading(true);
  try {
    const email = phoneToEmail(phone);
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    showLoading(false);
    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
      showErr(errEl, 'Phone number not found. Please create an account.');
    } else if (e.code === 'auth/wrong-password') {
      showErr(errEl, 'Incorrect password. Try again.');
    } else {
      showErr(errEl, 'Login failed. Check your details and try again.');
    }
  }
};

// ===== LOGOUT =====
window.doLogout = async function() {
  if (!confirm('Log out?')) return;
  if (chatUnsub) chatUnsub();
  await signOut(auth);
};

// ===== SHOW CHAT =====
function showChatScreen() {
  showLoading(false);
  hideAll();
  const cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  cs.style.flexDirection = 'column';

  // Set header
  document.getElementById('header-phone').textContent = currentPhone || '';
  const initials = (currentPhone || 'U').slice(-2);
  document.getElementById('user-avatar').textContent = initials;

  // Load messages
  loadMessages();

  // Focus keyboard
  setTimeout(() => {
    document.getElementById('msg-input').focus();
  }, 400);
}

// ===== LOAD MESSAGES =====
function loadMessages() {
  if (!currentUser) return;
  const chatId = currentUser.uid;
  const q = query(
    collection(db, 'chats', chatId, 'messages'),
    orderBy('timestamp', 'asc')
  );

  if (chatUnsub) chatUnsub();
  lastDateShown = null;

  chatUnsub = onSnapshot(q, (snapshot) => {
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    lastDateShown = null;

    if (snapshot.empty) {
      container.innerHTML = `<div class="empty-chat" id="empty-chat">
        <div class="empty-chat-icon">💬</div>
        <p>No messages yet.<br>Send your first message below!</p>
      </div>`;
      return;
    }

    snapshot.forEach(docSnap => {
      const msg = { id: docSnap.id, ...docSnap.data() };
      renderMessage(msg, container);
    });

    // Scroll to bottom
    container.scrollTop = container.scrollHeight;
  });
}

function renderMessage(msg, container) {
  const isFromUser = msg.sender === 'user';
  const isAdminUnsent = msg.unsent && msg.unsentBy === 'admin';

  // Date divider
  if (msg.timestamp) {
    const date = msg.timestamp.toDate();
    const dateStr = formatDate(date);
    if (dateStr !== lastDateShown) {
      lastDateShown = dateStr;
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${dateStr}</span>`;
      container.appendChild(div);
    }
  }

  const row = document.createElement('div');
  row.className = `msg-row ${isFromUser ? 'sent' : 'received'}`;
  row.dataset.msgId = msg.id;

  const time = msg.timestamp ? formatTime(msg.timestamp.toDate()) : '';

  let content = '';
  if (isAdminUnsent) {
    content = ''; // blank - as if nothing sent
  } else if (msg.unsent && msg.unsentBy === 'user') {
    content = `<div class="msg-text msg-unsent">🚫 Message unsent</div>`;
  } else {
    content = `<div class="msg-text">${escHtml(msg.text || '')}</div>`;
  }

  if (isAdminUnsent) return; // don't show at all

  row.innerHTML = `
    <div class="msg-bubble">
      ${content}
      <div class="msg-meta">
        <span class="msg-time">${time}</span>
        ${isFromUser ? '<span class="msg-tick">✓✓</span>' : ''}
      </div>
    </div>`;

  // Double tap to unsend for users - NO ACTION
  // (user cannot unsend)

  container.appendChild(row);
}

// ===== SEND MESSAGE =====
window.sendMessage = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  input.value = '';
  autoResize(input);

  try {
    const chatId = currentUser.uid;
    // Ensure chat doc exists
    await setDoc(doc(db, 'chats', chatId), {
      phone: currentPhone,
      uid: currentUser.uid,
      lastMessage: text,
      lastTime: serverTimestamp(),
      unread: true
    }, { merge: true });

    await addDoc(collection(db, 'chats', chatId, 'messages'), {
      text: text,
      sender: 'user',
      timestamp: serverTimestamp(),
      unsent: false,
      unsentBy: null
    });
  } catch (e) {
    showToast('Failed to send. Try again.');
  }
};

// ===== HELPERS =====
function formatTime(date) {
  return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function formatDate(date) {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (date.toDateString() === today.toDateString()) return 'Today';
  if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
};

window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};

window.toggleEye = function(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁️'; }
};

function showErr(el, msg) {
  el.textContent = msg; el.style.display = 'block';
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}

window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
};

// ===== SCREEN NAVIGATION =====
function hideAll() {
  ['auth-screen','login-screen','signup-screen','chat-screen'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
  });
}

window.showAuth = function() {
  hideAll();
  document.getElementById('auth-screen').style.display = 'flex';
};

window.showLogin = function() {
  hideAll();
  const el = document.getElementById('login-screen');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
};

window.showSignup = function() {
  hideAll();
  const el = document.getElementById('signup-screen');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
};

</script>
