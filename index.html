<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Africa Enterprise Challenge Funds</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="app.js" defer></script>

</head>

<body>

<div class="container">

<div class="logo">
<h2>Africa Enterprise Challenge Funds</h2>
<p>Secure Support Chat</p>
</div>

<div id="homePage">

<button id="loginBtn" class="mainBtn">
Login
</button>

<button id="signupBtn" class="mainBtn">
Create Account
</button>

</div>

<div id="loginPage" style="display:none;">

<h3>Login</h3>

<input
type="tel"
id="loginPhone"
placeholder="Phone Number">

<div class="passwordBox">

<input
type="password"
id="loginPassword"
placeholder="Password">

<button
type="button"
id="showLoginPassword">
👁
</button>

</div>

<button
id="loginNow"
class="greenBtn">
Login
</button>

<button
id="backHome1"
class="greyBtn">
Back
</button>

</div>

<div id="signupPage" style="display:none;">

<h3>Create Account</h3>

<input
type="tel"
id="signupPhone"
placeholder="Phone Number">

<div class="passwordBox">

<input
type="password"
id="signupPassword"
placeholder="Password">

<button
type="button"
id="showSignupPassword">
👁
</button>

</div>

<div class="passwordBox">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button
type="button"
id="showConfirmPassword">
👁
</button>

</div>

<button
id="createAccount"
class="greenBtn">
Create Account
</button>

<button
id="backHome2"
class="greyBtn">
Back
</button>

</div>

<div id="message"></div>

</div>

</body>
</html>
