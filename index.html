<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Chat</title>

<style>
body{margin:0;font-family:Arial;background:#0b141a;color:white;}

.header{
background:#1f2c34;
padding:10px;
text-align:center;
font-weight:bold;
}

.container{max-width:420px;margin:auto;}

.box{padding:10px;}

input,button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:5px;
}

button{background:#25D366;color:white;font-weight:bold;}

.chat{
height:70vh;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:10px;
margin:5px;
border-radius:10px;
word-wrap:break-word;
}

.me{background:#25D366;align-self:flex-end;}
.other{background:#2a3942;align-self:flex-start;}

.logout{
background:red;
width:auto;
padding:5px 10px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="header">Chat App</div>

<div class="container">

<div id="auth">
<div class="box">
<h3>Login / Signup</h3>
<input id="phone" placeholder="Phone Number">
<input id="pass" type="password" placeholder="Password">
<input id="pass2" type="password" placeholder="Confirm Password">
<button onclick="auth()">Continue</button>
</div>
</div>

<div id="chatUI" style="display:none;">
<div class="chat" id="chat"></div>

<div class="box">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
authDomain:"african-enterprise-challenge-f.firebaseapp.com",
databaseURL:"https://african-enterprise-challenge-f-default-rtdb.firebaseio.com/",
projectId:"african-enterprise-challenge-f",
storageBucket:"african-enterprise-challenge-f.firebasestorage.app",
messagingSenderId:"85146331644",
appId:"1:85146331644:web:b28599e0c8b75498fe6a79"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let phone=localStorage.getItem("phone");

if(phone){
show();
listen();
}

// AUTH
function auth(){
phone=document.getElementById("phone").value;
let p=document.getElementById("pass").value;
let p2=document.getElementById("pass2").value;

if(!phone||!p) return alert("Fill all");

db.ref("users/"+phone).once("value",snap=>{
if(snap.exists()){
if(snap.val().password!==p){
alert("Wrong password");return;
}
success();
}else{
if(p!==p2) return alert("Password mismatch");
db.ref("users/"+phone).set({phone,password:p});
success();
}
});
}

function success(){
localStorage.setItem("phone",phone);
show();
listen();
}

function show(){
document.getElementById("auth").style.display="none";
document.getElementById("chatUI").style.display="block";
}

// SEND
function send(){
let text=msg.value;
if(!text) return;

db.ref("chats/"+phone).push({
sender:"user",
text,
time:Date.now(),
deletedForUser:false,
deletedForAdmin:false
});

msg.value="";
}

// LISTEN
function listen(){
db.ref("chats/"+phone).on("value",render);
render();
}

// RENDER
function render(){
db.ref("chats/"+phone).once("value",snap=>{
chat.innerHTML="";

snap.forEach(m=>{
let d=m.val();

if(d.deletedForUser) return;

let div=document.createElement("div");
div.className="msg";
div.classList.add(d.sender==="user"?"me":"other");
div.innerText=d.text;

chat.appendChild(div);
});

chat.scrollTop=999999;
});
}

function logout(){
localStorage.removeItem("phone");
location.reload();
}
</script>

</body>
</html>
