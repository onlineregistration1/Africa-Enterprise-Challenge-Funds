<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, doc, setDoc, getDoc,
    addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
    authDomain: "african-enterprise-challenge-f.firebaseapp.com",
    projectId: "african-enterprise-challenge-f",
    storageBucket: "african-enterprise-challenge-f.firebasestorage.app",
    messagingSenderId: "85146331644",
    appId: "1:85146331644:web:b28599e0c8b75498fe6a79"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentUser = null;
  let unsubMessages = null;

  // ── UTILS ──
  function phoneKey(phone) {
    return phone.replace(/\D/g, '');
  }

  function hashPass(pass) {
    // Simple hash for demo — in production use bcrypt server-side
    let h = 0;
    for (let i = 0; i < pass.length; i++) {
      h = Math.imul(31, h) + pass.charCodeAt(i) | 0;
    }
    return h.toString(36) + pass.length;
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function formatDay(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const today = new Date();
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString();
  }

  // ── SESSION ──
  function saveSession(user) {
    localStorage.setItem('aec_user', JSON.stringify(user));
  }
  function loadSession() {
    try { return JSON.parse(localStorage.getItem('aec_user')); } catch { return null; }
  }
  function clearSession() {
    localStorage.removeItem('aec_user');
  }

  // ── SHOW/HIDE ──
  window.showLogin = () => {
    document.getElementById('login-card').style.display = '';
    document.getElementById('signup-card').style.display = 'none';
  };
  window.showSignup = () => {
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('signup-card').style.display = '';
  };

  window.togglePass = (id, btn) => {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  };

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('show');
  }
  function clearError(id) {
    const el = document.getElementById(id);
    el.classList.remove('show');
  }

  // ── AUTH ──
  window.doLogin = async () => {
    clearError('login-error');
    const phone = document.getElementById('login-phone').value.trim();
    const pass = document.getElementById('login-pass').value;
    if (!phone || !pass) return showError('login-error', 'Please fill all fields.');
    const key = phoneKey(phone);
    const snap = await getDoc(doc(db, 'users', key));
    if (!snap.exists()) return showError('login-error', 'Phone number not found. Create an account.');
    const data = snap.data();
    if (data.password !== hashPass(pass)) return showError('login-error', 'Incorrect password.');
    currentUser = { phone, key };
    saveSession(currentUser);
    enterChat();
  };

  window.doSignup = async () => {
    clearError('signup-error');
    const phone = document.getElementById('signup-phone').value.trim();
    const pass = document.getElementById('signup-pass').value;
    const pass2 = document.getElementById('signup-pass2').value;
    if (!phone || !pass || !pass2) return showError('signup-error', 'Please fill all fields.');
    if (pass !== pass2) return showError('signup-error', 'Passwords do not match.');
    if (pass.length < 6) return showError('signup-error', 'Password must be at least 6 characters.');
    const key = phoneKey(phone);
    const snap = await getDoc(doc(db, 'users', key));
    if (snap.exists()) return showError('signup-error', 'Phone number already registered. Please login.');
    await setDoc(doc(db, 'users', key), {
      phone, password: hashPass(pass), createdAt: serverTimestamp()
    });
    currentUser = { phone, key };
    saveSession(currentUser);
    enterChat();
  };

  window.doLogout = () => {
    if (unsubMessages) unsubMessages();
    clearSession();
    currentUser = null;
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('messages-area').innerHTML =
      '<div class="empty-chat" id="empty-chat"><div class="icon">💬</div><p>No messages yet.<br>Say hello below!</p></div>';
  };

  // ── CHAT ──
  function enterChat() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('user-phone-display').textContent = currentUser.phone;
    listenMessages();
  }

  function listenMessages() {
    if (unsubMessages) unsubMessages();
    const q = query(
      collection(db, 'chats', currentUser.key, 'messages'),
      orderBy('timestamp', 'asc')
    );
    unsubMessages = onSnapshot(q, (snap) => {
      renderMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }

  let lastDay = '';
  function renderMessages(msgs) {
    const area = document.getElementById('messages-area');
    const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
    area.innerHTML = '';
    lastDay = '';
    if (msgs.length === 0) {
      area.innerHTML = '<div class="empty-chat"><div class="icon">💬</div><p>No messages yet.<br>Say hello below!</p></div>';
      return;
    }
    msgs.forEach(msg => {
      // Day divider
      const day = formatDay(msg.timestamp);
      if (day !== lastDay) {
        const div = document.createElement('div');
        div.className = 'day-divider';
        div.innerHTML = `<span>${day}</span>`;
        area.appendChild(div);
        lastDay = day;
      }
      // Unsent by admin = totally hidden
      if (msg.unsentByAdmin) return;
      // Unsent by user = blank bubble (invisible to user too)
      if (msg.unsentByUser) return;

      const wrap = document.createElement('div');
      wrap.className = `msg-bubble ${msg.sender === 'user' ? 'sent' : 'received'}`;
      wrap.innerHTML = `
        <div>
          <div class="bubble">${escapeHtml(msg.text)}</div>
          <div class="msg-time">${formatTime(msg.timestamp)}</div>
        </div>`;
      area.appendChild(wrap);
    });
    if (wasAtBottom) area.scrollTop = area.scrollHeight;
  }

  window.sendMessage = async () => {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentUser) return;
    input.value = '';
    autoResize(input);
    await addDoc(collection(db, 'chats', currentUser.key, 'messages'), {
      text, sender: 'user',
      timestamp: serverTimestamp(),
      unsentByUser: false, unsentByAdmin: false
    });
    // Mark user as having new message for admin
    await setDoc(doc(db, 'users', currentUser.key), {
      lastMessage: text,
      lastMessageTime: serverTimestamp(),
      hasUnread: true,
      phone: currentUser.phone
    }, { merge: true });
  };

  window.handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  window.autoResize = (el) => {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  };

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  // ── INIT ──
  window.addEventListener('load', () => {
    document.getElementById('loading').style.display = 'none';
    const saved = loadSession();
    if (saved) {
      currentUser = saved;
      document.getElementById('auth-screen').style.display = 'none';
      enterChat();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
    }
  });
</script>
