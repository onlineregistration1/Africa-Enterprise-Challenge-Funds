<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Africa Enterprise Challenge Funds</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

<div class="header">

<h2>Africa Enterprise Challenge Funds</h2>

<p>Secure Customer Support</p>

</div>

<div class="form-box">

<div id="loginPage">

<h3>Login</h3>

<input
type="tel"
id="loginPhone"
placeholder="Phone Number"
autocomplete="tel">

<div class="password-box">

<input
type="password"
id="loginPassword"
placeholder="Password"
autocomplete="current-password">

<span
class="togglePassword"
onclick="togglePassword('loginPassword',this)">
👁
</span>

</div>

<button
id="loginBtn">

LOGIN

</button>

<p class="switchText">

Don't have an account?

<span onclick="showSignup()">

Create Account

</span>

</p>

</div>

<div
id="signupPage"
style="display:none;">

<h3>Create Account</h3>

<input
type="tel"
id="signupPhone"
placeholder="Phone Number"
autocomplete="tel">

<div class="password-box">

<input
type="password"
id="signupPassword"
placeholder="Create Password">

<span
class="togglePassword"
onclick="togglePassword('signupPassword',this)">
👁
</span>

</div>
<div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<span
class="togglePassword"
onclick="togglePassword('confirmPassword',this)">
👁
</span>

</div>

<button
id="signupBtn">

CREATE ACCOUNT

</button>

<p class="switchText">

Already have an account?

<span onclick="showLogin()">

Login

</span>

</p>

</div>

<div
id="messageBox">
</div>

</div>

</div>

<script>

function showSignup(){

document.getElementById("loginPage").style.display="none";
document.getElementById("signupPage").style.display="block";
document.getElementById("messageBox").innerHTML="";

}

function showLogin(){

document.getElementById("signupPage").style.display="none";
document.getElementById("loginPage").style.display="block";
document.getElementById("messageBox").innerHTML="";

}

function togglePassword(id,icon){

const input=document.getElementById(id);

if(input.type==="password"){

input.type="text";
icon.innerHTML="🙈";

}else{

input.type="password";
icon.innerHTML="👁";

}

}

</script>

<script type="module" src="script.js"></script>
</body>
</html>
