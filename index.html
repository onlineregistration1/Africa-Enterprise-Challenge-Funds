<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Africa Enterprise Challenge Funds</title>

<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#ece5dd;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.container{
width:100%;
max-width:420px;
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,.2);
}

.header{
background:#075E54;
color:#fff;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
}

.formBox{
padding:20px;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#25D366;
}

.passwordBox{
position:relative;
}

.passwordBox input{
padding-right:50px;
}

.eye{
position:absolute;
right:15px;
top:28px;
cursor:pointer;
font-size:18px;
user-select:none;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1fa855;
}

.switch{
margin-top:18px;
text-align:center;
font-size:15px;
}

.switch span{
color:#075E54;
font-weight:bold;
cursor:pointer;
}

#error{
margin-top:15px;
color:red;
text-align:center;
font-size:15px;
display:none;
}

#signupArea{
display:none;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
Africa Enterprise Challenge Funds
</div>

<div class="formBox">

<div id="loginArea">

<h2 style="text-align:center;">Login</h2>

<input
type="tel"
id="loginPhone"
placeholder="Phone Number">

<div class="passwordBox">

<input
type="password"
id="loginPassword"
placeholder="Password">

<span
class="eye"
onclick="togglePassword('loginPassword',this)">👁</span>

</div>

<button id="loginBtn">
LOGIN
</button>

<div class="switch">

Don't have an account?

<span onclick="showSignup()">

Create Account

</span>

</div>

</div>

<div id="signupArea">

<h2 style="text-align:center;">Create Account</h2>

<input
type="tel"
id="signupPhone"
placeholder="Phone Number">

<div class="passwordBox">

<input
type="password"
id="signupPassword"
placeholder="Create Password">

<span
class="eye"
onclick="togglePassword('signupPassword',this)">👁</span>

</div>

<div class="passwordBox">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<span
class="eye"
onclick="togglePassword('confirmPassword',this)">👁</span>

</div>

<button id="signupBtn">

CREATE ACCOUNT

</button>

<div class="switch">

Already have an account?

<span onclick="showLogin()">

Login

</span>

</div>

</div>

<div id="error"></div>

</div>

</div>

<script type="module" src="script.js"></script>

<script>
  function showSignup(){
document.getElementById("loginArea").style.display="none";
document.getElementById("signupArea").style.display="block";
document.getElementById("error").style.display="none";
}

function showLogin(){
document.getElementById("signupArea").style.display="none";
document.getElementById("loginArea").style.display="block";
document.getElementById("error").style.display="none";
}

function togglePassword(id,eye){

let input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
eye.innerHTML="🙈";
}else{
input.type="password";
eye.innerHTML="👁";
}

}

window.showSignup=showSignup;
window.showLogin=showLogin;
window.togglePassword=togglePassword;

</script>

</body>
</html>
