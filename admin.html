<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin | AEF</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <div id="loginScreen" class="screen">
    <h2>Admin Login</h2>
    <input id="aUser" placeholder="Username" value="Kibet Davis">
    <div class="pwd-wrap">
      <input type="password" id="aPass" placeholder="Password">
      <span class="eye" onclick="togglePwd('aPass')">👁️</span>
    </div>
    <button id="aLogin">Login</button>
    <p id="aMsg"></p>
  </div>

  <div id="adminScreen" class="screen hidden">
    <header>
      <button id="backBtn" class="small hidden">← Back</button>
      <span id="aHead">Admin</span>
      <button id="aLogout" class="red small">Logout</button>
    </header>

    <div id="userList"></div>
    <div id="chatBox" class="hidden"></div>

    <div id="inputWrap" class="hidden">
      <div id="previewBar"></div>
      <div class="row">
        <label class="attachBtn">+
          <input type="file" id="imgInput" accept="image/*" hidden>
        </label>
        <input id="msgInput" placeholder="Reply..." autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

</div>
<script type="module" src="admin.js"></script>
<script>window.togglePwd=id=>{let e=document.getElementById(id);e.type=e.type==='password'?'text':'password';}</script>
</body>
</html>
