<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>

/* ADMIN LAYOUT */

.admin-container{
width:100%;
max-width:500px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
background:#e5ddd5;
}

.admin-header{
background:#075E54;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.logout{
background:red;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

.users{
flex:1;
overflow-y:auto;
background:#fff;
padding:10px;
}

.user{
padding:12px;
background:#f1f1f1;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.user:hover{
background:#ddd;
}

.chat-box{
display:none;
flex-direction:column;
height:100%;
}

.chat-header{
background:#075E54;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
background:#e5ddd5;
display:flex;
flex-direction:column;
gap:6px;
}

.msg{
max-width:75%;
padding:8px;
border-radius:8px;
font-size:14px;
word-wrap:break-word;
}

.me{background:#DCF8C6;align-self:flex-end;}
.other{background:white;align-self:flex-start;}

.input-box{
display:flex;
padding:10px;
gap:6px;
background:white;
}

.input-box input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.input-box button{
background:#25D366;
border:none;
color:white;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.back{
background:#ccc;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="admin-container">

<div class="admin-header">

<span>Admin Panel</span>

<button class="logout" id="adminLogout">Logout</button>

</div>

<div class="users" id="usersList"></div>

<div class="chat-box" id="chatBox">

<div class="chat-header">

<button class="back" id="backBtn">Back</button>

<span id="chatTitle">Chat</span>

</div>

<div class="messages" id="adminMessages"></div>

<div class="input-box">

<input type="text" id="adminInput" placeholder="Reply...">

<button id="adminSend">Send</button>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
