<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --green: #25D366;
    --dark-green: #128C7E;
    --teal: #075E54;
    --bg: #0d1117;
    --header-bg: #1a1f2e;
    --sent-bg: #1a6b9a;
    --received-bg: #1e2635;
    --text-primary: #e9edef;
    --text-secondary: #8696a0;
    --border: #2a3441;
    --input-bg: #1e2635;
    --red: #e53935;
    --unread: #25D366;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
  }

  /* ===== ADMIN LOGIN ===== */
  #admin-login {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 24px;
    background: linear-gradient(135deg, #075E54 0%, #0d1117 60%);
  }

  .admin-logo {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .admin-login-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .admin-login-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 32px;
  }

  .admin-form { width: 100%; max-width: 340px; }

  .a-form-group { margin-bottom: 18px; }

  .a-form-label {
    display: block;
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .a-form-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 13px 44px 13px 14px;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .a-form-input:focus { border-color: var(--green); }
  .a-form-input::placeholder { color: rgba(255,255,255,0.35); }

  .a-input-wrap { position: relative; }

  .a-eye-btn {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,0.5);
    cursor: pointer; font-size: 18px; padding: 4px;
  }

  .a-login-btn {
    width: 100%;
    padding: 15px;
    background: var(--green);
    border: none; border-radius: 28px;
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
  }

  .a-login-btn:active { opacity: 0.85; }

  .a-login-error {
    background: rgba(229,57,53,0.15);
    border: 1px solid rgba(229,57,53,0.4);
    color: #ff6b6b;
    padding: 10px 14px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }

  /* ===== ADMIN MAIN LAYOUT ===== */
  #admin-main {
    display: none;
    height: 100vh;
    height: 100dvh;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  /* Admin header */
  .admin-header {
    background: var(--teal);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    min-height: 52px;
  }

  .admin-header-title {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
  }

  .admin-header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }

  .admin-logout-btn {
    background: var(--red);
    color: #fff; border: none;
    padding: 6px 12px; border-radius: 16px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
  }

  /* Users list view */
  #users-view {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .users-search {
    padding: 8px 12px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .users-search input {
    width: 100%;
    background: var(--input-bg);
    border: none; border-radius: 20px;
    padding: 8px 14px;
    color: var(--text-primary);
    font-size: 14px; outline: none;
  }

  .users-search input::placeholder { color: var(--text-secondary); }

  .users-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .user-item {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }

  .user-item:active { background: var(--header-bg); }

  .user-item-avatar {
    width: 46px; height: 46px;
    background: var(--dark-green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
    flex-shrink: 0; margin-right: 12px;
  }

  .user-item-info { flex: 1; min-width: 0; }

  .user-item-phone {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .user-item-phone.has-unread { color: var(--unread); }

  .user-item-preview {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-item-meta {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }

  .user-item-time {
    font-size: 11px; color: var(--text-secondary);
  }

  .unread-badge {
    background: var(--green);
    color: #fff;
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }

  .no-users {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--text-secondary);
    text-align: center; padding: 40px 20px;
  }

  .no-users-icon { font-size: 48px; margin-bottom: 12px; }

  /* Chat view (admin -> user) */
  #chat-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .chat-view-header {
    background: var(--teal);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; min-height: 52px;
  }

  .back-to-users {
    background: none; border: none;
    color: #fff; font-size: 22px; cursor: pointer; padding: 4px;
    line-height: 1;
  }

  .chat-user-info { flex: 1; }

  .chat-user-phone { font-size: 15px; font-weight: 600; color: #fff; }
  .chat-user-sub { font-size: 11px; color: rgba(255,255,255,0.7); }

  .delete-user-btn {
    background: rgba(229,57,53,0.25);
    border: 1px solid rgba(229,57,53,0.5);
    color: #ff6b6b; padding: 6px 10px;
    border-radius: 14px; font-size: 12px;
    cursor: pointer; font-weight: 600;
  }

  .admin-messages {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 10px 10px 6px;
    background: var(--bg);
    -webkit-overflow-scrolling: touch;
  }

  .admin-messages::-webkit-scrollbar { width: 3px; }
  .admin-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Message bubbles (same as user) */
  .msg-row { display: flex; margin-bottom: 2px; padding: 1px 0; }
  .msg-row.sent { justify-content: flex-end; }
  .msg-row.received { justify-content: flex-start; }

  .msg-bubble {
    max-width: 75%; padding: 7px 10px 4px;
    border-radius: 8px; position: relative;
    word-wrap: break-word; min-width: 60px;
  }

  .msg-row.sent .msg-bubble {
    background: var(--sent-bg); border-bottom-right-radius: 2px;
  }

  .msg-row.received .msg-bubble {
    background: var(--received-bg); border-bottom-left-radius: 2px;
  }

  .msg-text { font-size: 15px; line-height: 1.4; color: var(--text-primary); }
  .msg-unsent { font-size: 13px; color: var(--text-secondary); font-style: italic; }

  .msg-meta {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 3px; margin-top: 2px;
  }

  .msg-time { font-size: 10px; color: var(--text-secondary); }
  .msg-tick { font-size: 12px; color: var(--green); }

  .date-divider { text-align: center; margin: 12px 0; }
  .date-divider span {
    background: var(--header-bg); color: var(--text-secondary);
    font-size: 11px; padding: 4px 12px; border-radius: 10px;
  }

  /* Admin input */
  .admin-input-area {
    background: var(--header-bg);
    border-top: 1px solid var(--border);
    padding: 8px 10px; flex-shrink: 0; z-index: 10;
  }

  .input-row {
    display: flex; align-items: flex-end; gap: 8px;
  }

  .msg-input-wrap {
    flex: 1; background: var(--input-bg);
    border-radius: 22px; padding: 8px 14px;
    border: 1px solid var(--border);
    display: flex; align-items: flex-end; min-height: 44px;
  }

  #admin-msg-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text-primary); font-size: 15px;
    line-height: 1.4; resize: none;
    max-height: 100px; min-height: 22px;
    font-family: inherit; overflow-y: auto;
  }

  #admin-msg-input::placeholder { color: var(--text-secondary); }

  .send-btn {
    width: 44px; height: 44px;
    background: var(--green); border: none;
    border-radius: 50%; color: #fff; font-size: 20px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }

  .send-btn:active { opacity: 0.85; }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    background: var(--header-bg);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 4px 0;
    z-index: 999; min-width: 150px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .ctx-item {
    padding: 12px 18px; font-size: 14px;
    cursor: pointer; color: var(--text-primary);
  }

  .ctx-item:hover { background: var(--input-bg); }
  .ctx-item.danger { color: var(--red); }

  /* Long press delete overlay for users */
  .delete-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 990; background: transparent;
  }

  /* Loading */
  .loading-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: #333; color: #fff;
    padding: 10px 18px; border-radius: 20px;
    font-size: 13px; z-index: 999;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .empty-msgs {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--text-secondary);
    text-align: center; padding: 20px;
  }
  .empty-msgs-icon { font-size: 40px; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- ADMIN LOGIN -->
<div id="admin-login">
  <div class="admin-logo">🛡️</div>
  <div class="admin-login-title">Admin Panel</div>
  <div class="admin-login-sub">Chat Management</div>
  <div class="admin-form">
    <div class="a-login-error" id="a-login-error"></div>
    <div class="a-form-group">
      <label class="a-form-label">Username</label>
      <div class="a-input-wrap">
        <input type="text" class="a-form-input" id="a-username" placeholder="Enter username" autocomplete="username">
      </div>
    </div>
    <div class="a-form-group">
      <label class="a-form-label">Password</label>
      <div class="a-input-wrap">
        <input type="password" class="a-form-input" id="a-password" placeholder="Enter password" autocomplete="current-password">
        <button class="a-eye-btn" onclick="toggleAEye()">👁️</button>
      </div>
    </div>
    <button class="a-login-btn" onclick="adminLogin()">Log In as Admin</button>
  </div>
</div>

<!-- ADMIN MAIN -->
<div id="admin-main">

  <!-- Header -->
  <div class="admin-header">
    <div>
      <div class="admin-header-title">💬 Admin Panel</div>
      <div class="admin-header-sub">Kibet Davis</div>
    </div>
    <button class="admin-logout-btn" onclick="adminLogout()">Logout</button>
  </div>

  <!-- USERS VIEW -->
  <div id="users-view">
    <div class="users-search">
      <input type="text" placeholder="🔍  Search users..." id="user-search" oninput="filterUsers()">
    </div>
    <div class="users-list" id="users-list">
      <div class="no-users">
        <div class="no-users-icon">👥</div>
        <p>No users yet.<br>Users will appear here when they sign up.</p>
      </div>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="chat-view">
    <div class="chat-view-header">
      <button class="back-to-users" onclick="backToUsers()">&#8592;</button>
      <div class="chat-user-info">
        <div class="chat-user-phone" id="cv-phone">User</div>
        <div class="chat-user-sub" id="cv-sub">Chat</div>
      </div>
      <button class="delete-user-btn" onclick="confirmDeleteUser()">🗑️ Delete</button>
    </div>

    <div class="admin-messages" id="admin-messages">
      <div class="empty-msgs">
        <div class="empty-msgs-icon">💬</div>
        <p>No messages yet</p>
      </div>
    </div>

    <div class="admin-input-area">
      <div class="input-row">
        <div class="msg-input-wrap">
          <textarea id="admin-msg-input" placeholder="Type a message..." rows="1"
            oninput="adminAutoResize(this)"
            onkeydown="adminHandleKey(event)"></textarea>
        </div>
        <button class="send-btn" onclick="adminSendMessage()">&#10148;</button>
      </div>
    </div>
  </div>

</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu" style="display:none;">
  <div class="ctx-item danger" onclick="adminUnsendMsg()">🚫 Unsend Message</div>
  <div class="ctx-item" onclick="closeCtxMenu()">Cancel</div>
</div>
<div class="delete-overlay" id="ctx-overlay" style="display:none;" onclick="closeCtxMenu()"></div>

<!-- Loading -->
<div class="loading-overlay" id="a-loading" style="display:none;">
  <div class="spinner"></div>
</div>

<div class="toast" id="a-toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, addDoc, getDoc, getDocs,
  onSnapshot, query, orderBy, serverTimestamp, updateDoc, deleteDoc,
  writeBatch, where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth, deleteUser as fbDeleteUser, signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
  authDomain: "african-enterprise-challenge-f.firebaseapp.com",
  projectId: "african-enterprise-challenge-f",
  storageBucket: "african-enterprise-challenge-f.firebasestorage.app",
  messagingSenderId: "85146331644",
  appId: "1:85146331644:web:b28599e0c8b75498fe6a79",
  measurementId: "G-6C670QY54S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Admin credentials
const ADMIN_USER = 'Kibet Davis';
const ADMIN_PASS = 'Kwenik254$';
const ADMIN_STORE_KEY = 'admin_logged_in';

let allUsers = [];
let filteredUsers = [];
let currentChatUserId = null;
let currentChatUserPhone = null;
let chatUnsub = null;
let usersUnsub = null;
let selectedMsgId = null;
let lastDateShown = null;

// ===== CHECK ADMIN SESSION =====
if (localStorage.getItem(ADMIN_STORE_KEY) === 'true') {
  showAdminMain();
}

// ===== ADMIN LOGIN =====
window.adminLogin = function() {
  const u = document.getElementById('a-username').value.trim();
  const p = document.getElementById('a-password').value;
  const err = document.getElementById('a-login-error');
  err.style.display = 'none';

  if (u === ADMIN_USER && p === ADMIN_PASS) {
    localStorage.setItem(ADMIN_STORE_KEY, 'true');
    showAdminMain();
  } else {
    err.textContent = 'Incorrect username or password.';
    err.style.display = 'block';
  }
};

window.adminLogout = function() {
  if (!confirm('Log out of admin panel?')) return;
  localStorage.removeItem(ADMIN_STORE_KEY);
  if (usersUnsub) usersUnsub();
  if (chatUnsub) chatUnsub();
  document.getElementById('admin-main').style.display = 'none';
  document.getElementById('admin-login').style.display = 'flex';
};

window.toggleAEye = function() {
  const inp = document.getElementById('a-password');
  const btn = document.querySelector('.a-eye-btn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
};

function showAdminMain() {
  document.getElementById('admin-login').style.display = 'none';
  const m = document.getElementById('admin-main');
  m.style.display = 'flex';
  m.style.flexDirection = 'column';
  loadUsers();
}

// ===== LOAD USERS (real-time) =====
function loadUsers() {
  showALoading(true);
  const chatsRef = collection(db, 'chats');
  
  if (usersUnsub) usersUnsub();
  
  usersUnsub = onSnapshot(chatsRef, (snapshot) => {
    showALoading(false);
    allUsers = [];
    snapshot.forEach(d => {
      allUsers.push({ id: d.id, ...d.data() });
    });
    // Sort by lastTime desc (most recent first)
    allUsers.sort((a, b) => {
      const ta = a.lastTime?.toMillis?.() || 0;
      const tb = b.lastTime?.toMillis?.() || 0;
      return tb - ta;
    });
    filteredUsers = [...allUsers];
    renderUsersList();
  });
}

function renderUsersList() {
  const list = document.getElementById('users-list');
  if (filteredUsers.length === 0) {
    list.innerHTML = `<div class="no-users">
      <div class="no-users-icon">👥</div>
      <p>No users yet.</p>
    </div>`;
    return;
  }

  list.innerHTML = '';
  filteredUsers.forEach(u => {
    const phone = u.phone || u.id;
    const initials = phone.slice(-2);
    const hasUnread = u.unread === true;
    const lastMsg = u.lastMessage || 'No messages';
    const lastTime = u.lastTime ? formatTime(u.lastTime.toDate()) : '';

    const item = document.createElement('div');
    item.className = 'user-item';
    item.dataset.uid = u.id;
    item.innerHTML = `
      <div class="user-item-avatar">${initials}</div>
      <div class="user-item-info">
        <div class="user-item-phone ${hasUnread ? 'has-unread' : ''}">${phone}</div>
        <div class="user-item-preview">${escHtml(lastMsg)}</div>
      </div>
      <div class="user-item-meta">
        <div class="user-item-time">${lastTime}</div>
        ${hasUnread ? '<div class="unread-badge">●</div>' : ''}
      </div>`;

    // Tap to open chat
    item.addEventListener('click', () => openUserChat(u.id, phone));

    // Long press to delete
    let pressTimer;
    item.addEventListener('touchstart', () => {
      pressTimer = setTimeout(() => {
        if (confirm(`Delete user ${phone}? This will erase all their data.`)) {
          deleteUserData(u.id, u.uid);
        }
      }, 700);
    });
    item.addEventListener('touchend', () => clearTimeout(pressTimer));
    item.addEventListener('touchmove', () => clearTimeout(pressTimer));

    list.appendChild(item);
  });
}

window.filterUsers = function() {
  const q = document.getElementById('user-search').value.toLowerCase();
  filteredUsers = allUsers.filter(u => (u.phone || u.id).toLowerCase().includes(q));
  renderUsersList();
};

// ===== OPEN USER CHAT =====
function openUserChat(uid, phone) {
  currentChatUserId = uid;
  currentChatUserPhone = phone;

  document.getElementById('cv-phone').textContent = phone;
  document.getElementById('cv-sub').textContent = 'Chat with user';

  document.getElementById('users-view').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';
  cv.style.flexDirection = 'column';

  // Mark as read
  updateDoc(doc(db, 'chats', uid), { unread: false }).catch(() => {});

  loadAdminMessages(uid);

  setTimeout(() => {
    document.getElementById('admin-msg-input').focus();
  }, 300);
}

window.backToUsers = function() {
  if (chatUnsub) chatUnsub();
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('users-view').style.display = 'flex';
  document.getElementById('users-view').style.flexDirection = 'column';
  currentChatUserId = null;
};

// ===== LOAD MESSAGES =====
function loadAdminMessages(uid) {
  const q = query(
    collection(db, 'chats', uid, 'messages'),
    orderBy('timestamp', 'asc')
  );

  if (chatUnsub) chatUnsub();
  lastDateShown = null;

  chatUnsub = onSnapshot(q, (snapshot) => {
    const container = document.getElementById('admin-messages');
    container.innerHTML = '';
    lastDateShown = null;

    if (snapshot.empty) {
      container.innerHTML = `<div class="empty-msgs">
        <div class="empty-msgs-icon">💬</div><p>No messages yet</p></div>`;
      return;
    }

    snapshot.forEach(docSnap => {
      const msg = { id: docSnap.id, ...docSnap.data() };
      renderAdminMessage(msg, container);
    });

    container.scrollTop = container.scrollHeight;
  });
}

function renderAdminMessage(msg, container) {
  // Date divider
  if (msg.timestamp) {
    const date = msg.timestamp.toDate();
    const dateStr = formatDate(date);
    if (dateStr !== lastDateShown) {
      lastDateShown = dateStr;
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${dateStr}</span>`;
      container.appendChild(div);
    }
  }

  const isFromUser = msg.sender === 'user'; // received by admin
  const isAdminMsg = msg.sender === 'admin'; // sent by admin

  // If admin unsent - show blank (skip rendering)
  if (msg.unsent && msg.unsentBy === 'admin') return;

  // If user unsent - show as unsent note
  const isUserUnsent = msg.unsent && msg.unsentBy === 'user';

  const row = document.createElement('div');
  row.className = `msg-row ${isAdminMsg ? 'sent' : 'received'}`;
  row.dataset.msgId = msg.id;

  const time = msg.timestamp ? formatTime(msg.timestamp.toDate()) : '';
  let content = isUserUnsent
    ? `<div class="msg-text msg-unsent">🚫 User unsent this</div>`
    : `<div class="msg-text">${escHtml(msg.text || '')}</div>`;

  row.innerHTML = `
    <div class="msg-bubble">
      ${content}
      <div class="msg-meta">
        <span class="msg-time">${time}</span>
        ${isAdminMsg ? '<span class="msg-tick">✓✓</span>' : ''}
      </div>
    </div>`;

  // Double tap to unsend (admin only, non-unsent messages)
  if (!isUserUnsent && !msg.unsent) {
    let lastTap = 0;
    row.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTap < 350) {
        e.preventDefault();
        selectedMsgId = msg.id;
        showCtxMenu(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      }
      lastTap = now;
    });

    // Desktop double click
    row.addEventListener('dblclick', (e) => {
      selectedMsgId = msg.id;
      showCtxMenu(e.clientX, e.clientY);
    });
  }

  container.appendChild(row);
}

// ===== CONTEXT MENU (unsend) =====
function showCtxMenu(x, y) {
  const menu = document.getElementById('ctx-menu');
  const overlay = document.getElementById('ctx-overlay');
  menu.style.display = 'block';
  overlay.style.display = 'block';

  // Position menu
  const vw = window.innerWidth, vh = window.innerHeight;
  const mw = 160, mh = 90;
  let left = x, top = y;
  if (left + mw > vw) left = vw - mw - 10;
  if (top + mh > vh) top = vh - mh - 10;
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
}

window.closeCtxMenu = function() {
  document.getElementById('ctx-menu').style.display = 'none';
  document.getElementById('ctx-overlay').style.display = 'none';
  selectedMsgId = null;
};

window.adminUnsendMsg = async function() {
  if (!selectedMsgId || !currentChatUserId) { closeCtxMenu(); return; }
  closeCtxMenu();
  try {
    await updateDoc(
      doc(db, 'chats', currentChatUserId, 'messages', selectedMsgId),
      { unsent: true, unsentBy: 'admin', text: '' }
    );
    showAToast('Message unsent');
  } catch (e) {
    showAToast('Failed to unsend');
  }
};

// ===== SEND MESSAGE (admin to user) =====
window.adminSendMessage = async function() {
  const input = document.getElementById('admin-msg-input');
  const text = input.value.trim();
  if (!text || !currentChatUserId) return;

  input.value = '';
  adminAutoResize(input);

  try {
    await setDoc(doc(db, 'chats', currentChatUserId), {
      lastMessage: '(Admin) ' + text,
      lastTime: serverTimestamp(),
      unread: false
    }, { merge: true });

    await addDoc(collection(db, 'chats', currentChatUserId, 'messages'), {
      text: text,
      sender: 'admin',
      timestamp: serverTimestamp(),
      unsent: false,
      unsentBy: null
    });
  } catch (e) {
    showAToast('Failed to send message');
  }
};

// ===== DELETE USER =====
window.confirmDeleteUser = function() {
  if (!currentChatUserId) return;
  if (confirm(`Delete user ${currentChatUserPhone}? All their chats will be erased.`)) {
    deleteUserData(currentChatUserId, null);
  }
};

async function deleteUserData(uid, authUid) {
  showALoading(true);
  try {
    // Delete all messages
    const msgs = await getDocs(collection(db, 'chats', uid, 'messages'));
    const batch = writeBatch(db);
    msgs.forEach(m => batch.delete(m.ref));
    // Delete chat doc
    batch.delete(doc(db, 'chats', uid));
    // Delete user doc
    batch.delete(doc(db, 'users', uid));
    await batch.commit();

    showALoading(false);
    showAToast('User deleted');
    backToUsers();
  } catch (e) {
    showALoading(false);
    showAToast('Error deleting user: ' + e.message);
  }
}

// ===== HELPERS =====
function formatTime(date) {
  return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function formatDate(date) {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (date.toDateString() === today.toDateString()) return 'Today';
  if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

window.adminAutoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
};

window.adminHandleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    adminSendMessage();
  }
};

function showALoading(v) {
  document.getElementById('a-loading').style.display = v ? 'flex' : 'none';
}

function showAToast(msg) {
  const t = document.getElementById('a-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

</script>
