<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel – ChatApp</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'Segoe UI',sans-serif;
  background:#0b1014; color:#fff;
  height:100dvh; display:flex; flex-direction:column; overflow:hidden;
}

/* ── LOADING ── */
#loading-overlay {
  position:fixed; inset:0; background:#0b1014;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; z-index:999;
}
.loader {
  width:36px; height:36px;
  border:3px solid #2c3e4a; border-top-color:#f39c12;
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── ADMIN LOGIN ── */
#admin-login {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:linear-gradient(160deg,#0b1014 0%,#1a2a35 100%);
  padding:24px;
}
.admin-logo  { font-size:52px; margin-bottom:8px; }
.admin-title { font-size:24px; font-weight:700; color:#f39c12; margin-bottom:4px; }
.admin-sub   { font-size:13px; color:#8a9ba8; margin-bottom:32px; }

.auth-card {
  background:#1c2b33; border-radius:16px; padding:28px 24px;
  width:100%; max-width:380px; box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.auth-card h2         { font-size:18px; font-weight:600; margin-bottom:20px; color:#e8f4f8; }
.input-group          { margin-bottom:16px; }
.input-group label    { font-size:12px; color:#8a9ba8; display:block; margin-bottom:6px; font-weight:500; }
.input-group input    {
  width:100%; padding:14px 16px; background:#0d1f2b;
  border:1.5px solid #2c3e4a; border-radius:10px;
  color:#fff; font-size:16px; outline:none;
}
.input-group input:focus        { border-color:#f39c12; }
.input-group input::placeholder { color:#4a6070; }

.pw-wrap       { position:relative; }
.pw-wrap input { padding-right:48px; }
.eye-btn {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:#8a9ba8; font-size:18px; padding:4px;
}

.btn-primary {
  width:100%; padding:15px; background:#f39c12; border:none;
  border-radius:10px; color:#fff; font-size:16px; font-weight:700;
  cursor:pointer; margin-top:8px;
}
.btn-primary:active { background:#d68910; }
.msg-err { font-size:13px; color:#ff6b6b; margin-top:10px; text-align:center; min-height:18px; }

/* ── ADMIN PANEL wrapper ── */
#admin-panel { flex:1; display:none; flex-direction:column; height:100dvh; overflow:hidden; }

/* ── SHARED TOP BAR ── */
.top-bar {
  background:#1c2b33; padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid #2c3e4a; min-height:56px; flex-shrink:0;
}
.top-bar-title { font-size:17px; font-weight:700; color:#f39c12; }
.top-bar-right { display:flex; align-items:center; gap:8px; }

.btn-wa {
  background:#25d366; border:none; border-radius:8px;
  color:#fff; font-size:12px; font-weight:700; padding:7px 10px;
  display:flex; align-items:center; gap:5px; text-decoration:none; white-space:nowrap;
}
.btn-wa svg { width:15px; height:15px; fill:#fff; flex-shrink:0; }
.btn-logout {
  background:#e74c3c; border:none; border-radius:8px;
  color:#fff; font-size:12px; font-weight:700; padding:7px 10px; cursor:pointer; white-space:nowrap;
}
.btn-back {
  background:none; border:none; color:#f39c12;
  font-size:22px; cursor:pointer; padding:4px 8px; line-height:1;
}

/* ── USERS LIST VIEW ── */
#users-view { display:flex; flex-direction:column; flex:1; overflow:hidden; }

.hint-text {
  font-size:11px; color:#4a6070; text-align:center;
  padding:6px 16px; background:#0d1f2b; flex-shrink:0;
}

#users-list { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
#users-list::-webkit-scrollbar       { width:3px; }
#users-list::-webkit-scrollbar-thumb { background:#2c3e4a; border-radius:2px; }

.user-item {
  display:flex; align-items:center; gap:12px;
  padding:13px 16px; border-bottom:1px solid #111d24;
  cursor:pointer; transition:background .15s;
}
.user-item:active { background:#1c2b33; }

.ui-avatar {
  width:46px; height:46px; border-radius:50%; background:#2c3e4a;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; font-weight:700; color:#f39c12; flex-shrink:0;
}
.ui-info   { flex:1; min-width:0; }
.ui-name   {
  font-size:15px; font-weight:600; color:#e8f4f8;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ui-name.unread { color:#25d366; }
.ui-last   {
  font-size:13px; color:#8a9ba8; margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ui-meta   { display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
.ui-time   { font-size:11px; color:#8a9ba8; white-space:nowrap; }
.ui-dot    {
  width:10px; height:10px; background:#25d366;
  border-radius:50%; display:none;
}
.ui-dot.show { display:block; }

.spinner   { text-align:center; color:#f39c12; padding:28px; font-size:13px; }
.empty-msg { text-align:center; color:#4a6070; padding:40px 20px; font-size:14px; }

/* ── SINGLE CHAT VIEW ── */
#chat-view { display:none; flex-direction:column; flex:1; overflow:hidden; }

.chat-user-phone  { font-size:15px; font-weight:700; color:#e8f4f8; }
.chat-user-status { font-size:11px; color:#25d366; }

.cv-avatar {
  width:36px; height:36px; border-radius:50%; background:#2c3e4a; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:#f39c12;
}

/* messages */
#admin-messages {
  flex:1; overflow-y:auto; padding:12px 10px;
  display:flex; flex-direction:column; gap:2px;
  background:#0b1014; -webkit-overflow-scrolling:touch;
}
#admin-messages::-webkit-scrollbar       { width:3px; }
#admin-messages::-webkit-scrollbar-thumb { background:#2c3e4a; border-radius:2px; }

.day-divider { text-align:center; margin:10px 0; }
.day-divider span {
  background:#1c2b33; color:#8a9ba8;
  font-size:11px; padding:4px 12px; border-radius:10px;
}

.msg-bubble-wrap          { display:flex; flex-direction:column; margin-bottom:3px; }
.msg-bubble-wrap.sent     { align-items:flex-end; }
.msg-bubble-wrap.received { align-items:flex-start; }

.msg-bubble {
  max-width:78%; padding:9px 13px; border-radius:12px;
  font-size:15px; line-height:1.45; word-break:break-word;
}
.sent .msg-bubble     { background:#005c4b; color:#e8f4f8; border-bottom-right-radius:3px; }
.received .msg-bubble { background:#1c2b33; color:#e8f4f8; border-bottom-left-radius:3px; }

.msg-unsent-bubble { background:transparent !important; border:1.5px dashed #2c3e4a !important; }
.msg-unsent-text   { font-style:italic; color:#4a6070; font-size:13px; }

.msg-meta      { font-size:10px; color:#8a9ba8; margin-top:2px; padding:0 4px; }
.sent .msg-meta{ text-align:right; }

/* bottom input */
.chat-bottom {
  background:#1c2b33; padding:10px;
  flex-shrink:0; border-top:1px solid #2c3e4a;
}
.input-row { display:flex; align-items:flex-end; gap:8px; }

#admin-input {
  flex:1; background:#0d1f2b; border:1.5px solid #2c3e4a; border-radius:22px;
  color:#fff; font-size:16px; padding:11px 18px; outline:none; resize:none;
  max-height:120px; min-height:44px; line-height:1.4;
  font-family:inherit; overflow-y:auto;
}
#admin-input:focus        { border-color:#f39c12; }
#admin-input::placeholder { color:#4a6070; }

#admin-send-btn {
  width:44px; height:44px; border-radius:50%; background:#f39c12;
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
#admin-send-btn:active { background:#d68910; }
#admin-send-btn svg    { width:22px; height:22px; fill:#fff; }

/* ── BOTTOM SHEETS ── */
.sheet-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:90; display:none;
}
.sheet-overlay.open { display:block; }

.bottom-sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:#1c2b33; border-radius:18px 18px 0 0;
  padding:20px 16px 36px; z-index:91; display:none;
  border-top:1px solid #2c3e4a;
}
.bottom-sheet.open { display:block; }

.sheet-title { font-size:13px; color:#8a9ba8; text-align:center; margin-bottom:18px; }
.sheet-btn {
  width:100%; padding:14px; border:none; border-radius:10px;
  font-size:16px; font-weight:600; cursor:pointer; margin-bottom:10px; display:block;
}
.sheet-btn.danger { background:#e74c3c; color:#fff; }
.sheet-btn.cancel { background:#2c3e4a; color:#e8f4f8; }

.hidden { display:none !important; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc,
  addDoc, setDoc, getDoc, getDocs,
  onSnapshot, query, orderBy,
  serverTimestamp, updateDoc,
  deleteDoc, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── Firebase config ── */
const app = initializeApp({
  apiKey:            "AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
  authDomain:        "african-enterprise-challenge-f.firebaseapp.com",
  projectId:         "african-enterprise-challenge-f",
  storageBucket:     "african-enterprise-challenge-f.firebasestorage.app",
  messagingSenderId: "85146331644",
  appId:             "1:85146331644:web:b28599e0c8b75498fe6a79",
  measurementId:     "G-6C670QY54S"
});
const db = getFirestore(app);

/* ── Admin credentials ── */
const ADMIN_USER = 'Kibet Davis';
const ADMIN_PASS = 'Kwenik254$';

/* ── State ── */
let currentChatPhone = null;
let unsubMessages    = null;
let unsubUsers       = null;
let selectedUser     = null;
let selectedMsgId    = null;
let lpTimer          = null;  // long-press timer

/* ── Eye toggle ── */
window.toggleEye = function(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
};

/* ── Admin login ── */
window.doAdminLogin = function() {
  const u = document.getElementById('admin-user').value.trim();
  const p = document.getElementById('admin-pw').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    localStorage.setItem('admin_session','1');
    document.getElementById('admin-login').classList.add('hidden');
    const panel = document.getElementById('admin-panel');
    panel.style.display = 'flex'; panel.style.flexDirection = 'column';
    startUsersListener();
  } else {
    document.getElementById('admin-err').textContent = 'Wrong username or password.';
  }
};

window.adminLogout = function() {
  if (!confirm('Log out of admin panel?')) return;
  localStorage.removeItem('admin_session');
  if (unsubUsers)    unsubUsers();
  if (unsubMessages) unsubMessages();
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('admin-login').classList.remove('hidden');
  document.getElementById('admin-user').value = '';
  document.getElementById('admin-pw').value   = '';
  document.getElementById('admin-err').textContent = '';
};

/* ══════════════════════════
   USERS LIST
══════════════════════════ */
function startUsersListener() {
  document.getElementById('users-spinner').style.display = 'block';
  if (unsubUsers) unsubUsers();

  unsubUsers = onSnapshot(collection(db,'chats'), snap => {
    document.getElementById('users-spinner').style.display = 'none';
    const list = document.getElementById('users-list');
    list.innerHTML = '';

    /* sort most-recent first */
    const docs = snap.docs
      .filter(d => d.data().phone)
      .sort((a,b) => {
        const ta = a.data().lastTime?.toMillis?.() ?? 0;
        const tb = b.data().lastTime?.toMillis?.() ?? 0;
        return tb - ta;
      });

    if (!docs.length) {
      list.innerHTML = '<div class="empty-msg">No users yet</div>';
      return;
    }

    docs.forEach(d => {
      const data    = d.data();
      const phone   = data.phone || d.id;
      const lastMsg = data.lastMsg || '';
      const unread  = !!data.unread;
      const dt      = data.lastTime?.toDate?.();
      const timeStr = dt
        ? dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
        : '';
      const initials = phone.replace(/\D/g,'').slice(-2) || 'U';

      const item = document.createElement('div');
      item.className = 'user-item';
      item.innerHTML = `
        <div class="ui-avatar">${initials}</div>
        <div class="ui-info">
          <div class="ui-name ${unread?'unread':''}">${phone}</div>
          <div class="ui-last">${lastMsg ? lastMsg.substring(0,55) : 'No messages yet'}</div>
        </div>
        <div class="ui-meta">
          <div class="ui-time">${timeStr}</div>
          <div class="ui-dot ${unread?'show':''}"></div>
        </div>`;

      /* tap → open chat */
      item.addEventListener('click', () => openChat(phone));

      /* long press → delete sheet */
      const startLP = () => { lpTimer = setTimeout(() => openUserSheet(phone), 700); };
      const clearLP = () => clearTimeout(lpTimer);
      item.addEventListener('touchstart', startLP, {passive:true});
      item.addEventListener('touchend',   clearLP);
      item.addEventListener('touchmove',  clearLP);
      item.addEventListener('mousedown',  startLP);
      item.addEventListener('mouseup',    clearLP);
      item.addEventListener('mouseleave', clearLP);

      list.appendChild(item);
    });
  });
}

/* ══════════════════════════
   USER-DELETE SHEET
══════════════════════════ */
function openUserSheet(phone) {
  selectedUser = phone;
  document.getElementById('user-sheet-title').textContent = `Delete user: ${phone}`;
  document.getElementById('user-sheet-overlay').classList.add('open');
  document.getElementById('user-sheet').classList.add('open');
}
window.closeUserSheet = function() {
  document.getElementById('user-sheet-overlay').classList.remove('open');
  document.getElementById('user-sheet').classList.remove('open');
  selectedUser = null;
};
window.confirmDeleteUser = async function() {
  if (!selectedUser) { closeUserSheet(); return; }
  const phone = selectedUser;
  closeUserSheet();
  if (!confirm(`Permanently delete user ${phone} and all their messages?`)) return;
  try {
    /* delete all messages in sub-collection */
    const msgs  = await getDocs(collection(db,'chats',phone,'messages'));
    const batch = writeBatch(db);
    msgs.forEach(m => batch.delete(m.ref));
    await batch.commit();
    /* delete chat doc + user doc */
    await deleteDoc(doc(db,'chats',phone));
    await deleteDoc(doc(db,'users',phone));
  } catch(e) {
    console.error(e);
    alert('Error deleting user. Try again.');
  }
};

/* ══════════════════════════
   OPEN CHAT
══════════════════════════ */
function openChat(phone) {
  currentChatPhone = phone;

  /* switch views */
  document.getElementById('users-view').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex'; cv.style.flexDirection = 'column';

  document.getElementById('cv-phone').textContent  = phone;
  document.getElementById('cv-avatar').textContent = phone.replace(/\D/g,'').slice(-2) || 'U';

  /* mark read */
  updateDoc(doc(db,'chats',phone), {unread:false}).catch(()=>{});

  listenAdminMessages(phone);
  setTimeout(() => document.getElementById('admin-input').focus(), 300);
}

window.backToUsers = function() {
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  currentChatPhone = null;
  document.getElementById('chat-view').style.display  = 'none';
  const uv = document.getElementById('users-view');
  uv.style.display = 'flex'; uv.style.flexDirection = 'column';
};

/* ══════════════════════════
   MESSAGES LISTENER
══════════════════════════ */
function listenAdminMessages(phone) {
  if (unsubMessages) unsubMessages();
  document.getElementById('admin-msg-spinner').style.display = 'block';
  const q = query(
    collection(db,'chats',phone,'messages'),
    orderBy('timestamp','asc')
  );
  unsubMessages = onSnapshot(q, snap => {
    document.getElementById('admin-msg-spinner').style.display = 'none';
    renderAdminMessages(snap.docs);
  });
}

let lastAdminDate = '';
function renderAdminMessages(docs) {
  const area     = document.getElementById('admin-messages');
  const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  area.innerHTML = '';
  lastAdminDate  = '';

  if (!docs.length) {
    area.innerHTML = '<div class="empty-msg">No messages yet — send the first one!</div>';
    return;
  }

  docs.forEach(d => {
    const data = d.data();

    /* skip fully-hidden admin-unsent messages */
    if (data.adminUnsent) return;

    /* day divider */
    if (data.timestamp) {
      const dt = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
      const ds = dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
      if (ds !== lastAdminDate) {
        lastAdminDate = ds;
        const div = document.createElement('div');
        div.className = 'day-divider';
        div.innerHTML = `<span>${ds}</span>`;
        area.appendChild(div);
      }
    }

    const isAdmin = data.sender === 'admin';
    const unsent  = data.unsent;   /* user-unsent — visible to admin */

    const wrap   = document.createElement('div');
    wrap.className = `msg-bubble-wrap ${isAdmin ? 'sent' : 'received'}`;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (unsent ? ' msg-unsent-bubble' : '');

    if (unsent) {
      bubble.textContent = 'User unsent this message';
      bubble.classList.add('msg-unsent-text');
    } else {
      bubble.textContent = data.text || '';
    }

    /* time + sender label */
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    let timeStr = '';
    if (data.timestamp) {
      const dt = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
      timeStr = dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    }
    meta.textContent = `${isAdmin ? '✓ You' : '👤 User'} · ${timeStr}`;

    /* long-press / double-tap on admin messages to unsend */
    if (isAdmin && !unsent) {
      bubble.style.cursor = 'pointer';
      let lpt;
      const startLP = () => { lpt = setTimeout(() => openMsgSheet(d.id), 600); };
      const clearLP = () => clearTimeout(lpt);
      bubble.addEventListener('touchstart', startLP,  {passive:true});
      bubble.addEventListener('touchend',   clearLP);
      bubble.addEventListener('touchmove',  clearLP);
      bubble.addEventListener('mousedown',  startLP);
      bubble.addEventListener('mouseup',    clearLP);
      bubble.addEventListener('mouseleave', clearLP);
      bubble.addEventListener('dblclick',   () => openMsgSheet(d.id));
    }

    wrap.appendChild(bubble);
    wrap.appendChild(meta);
    area.appendChild(wrap);
  });

  if (atBottom) area.scrollTop = area.scrollHeight;
}

/* ══════════════════════════
   ADMIN SEND
══════════════════════════ */
window.adminSend = async function() {
  const inp  = document.getElementById('admin-input');
  const text = inp.value.trim();
  if (!text || !currentChatPhone) return;
  inp.value = ''; inp.style.height = '';
  try {
    await addDoc(collection(db,'chats',currentChatPhone,'messages'), {
      text, sender:'admin',
      timestamp:serverTimestamp(),
      unsent:false, adminUnsent:false
    });
    await setDoc(doc(db,'chats',currentChatPhone), {
      phone:currentChatPhone,
      lastMsg:`(Admin) ${text}`,
      lastTime:serverTimestamp(),
      unread:false
    }, {merge:true});
  } catch(e) { console.error(e); }
};

window.adminKeyDown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); adminSend(); }
};
window.adminResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

/* ══════════════════════════
   ADMIN UNSEND
══════════════════════════ */
function openMsgSheet(msgId) {
  selectedMsgId = msgId;
  document.getElementById('msg-sheet-overlay').classList.add('open');
  document.getElementById('msg-sheet').classList.add('open');
}
window.closeMsgSheet = function() {
  document.getElementById('msg-sheet-overlay').classList.remove('open');
  document.getElementById('msg-sheet').classList.remove('open');
  selectedMsgId = null;
};
window.doAdminUnsend = async function() {
  if (!selectedMsgId || !currentChatPhone) { closeMsgSheet(); return; }
  try {
    await updateDoc(
      doc(db,'chats',currentChatPhone,'messages',selectedMsgId),
      { adminUnsent:true, text:'' }
    );
  } catch(e) { console.error(e); }
  closeMsgSheet();
};

/* ══════════════════════════
   INIT
══════════════════════════ */
async function init() {
  await new Promise(r => setTimeout(r, 700));
  document.getElementById('loading-overlay').style.display = 'none';
  if (localStorage.getItem('admin_session') === '1') {
    const panel = document.getElementById('admin-panel');
    panel.style.display = 'flex'; panel.style.flexDirection = 'column';
    startUsersListener();
  } else {
    document.getElementById('admin-login').classList.remove('hidden');
  }
}
init();
</script>
