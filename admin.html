<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',sans-serif;background:#111b21;color:#e9edef;height:100dvh;display:flex;flex-direction:column;overflow:hidden;max-width:480px;margin:0 auto;}
  #adminLogin{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;background:#111b21;}
  .admin-logo{font-size:48px;margin-bottom:12px;text-align:center;}
  .admin-badge{background:#00a884;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:20px;letter-spacing:1px;}
  .auth-card{background:#1f2c34;border-radius:16px;padding:24px;width:100%;max-width:360px;}
  .auth-card h2{font-size:18px;color:#e9edef;margin-bottom:20px;text-align:center;}
  .input-group{margin-bottom:16px;position:relative;}
  .input-group label{display:block;font-size:12px;color:#8696a0;margin-bottom:6px;}
  .input-group input{width:100%;background:#2a3942;border:1px solid #374045;border-radius:10px;padding:14px 48px 14px 14px;color:#e9edef;font-size:16px;outline:none;}
  .input-group input:focus{border-color:#00a884;}
  .eye-btn{position:absolute;right:14px;top:38px;background:none;border:none;color:#8696a0;font-size:18px;cursor:pointer;}
  .auth-btn{width:100%;background:#00a884;color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;}
  .auth-err{color:#f15c6d;font-size:12px;margin-top:8px;text-align:center;min-height:16px;}
  #adminPanel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .top-bar{background:#1f2c34;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:56px;}
  .top-title{font-size:15px;font-weight:700;color:#00a884;display:flex;align-items:center;gap:6px;}
  .top-right{display:flex;align-items:center;gap:8px;}
  .wa-btn{background:#25d366;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;}
  .logout-btn{background:#f15c6d;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;}
  #usersList{flex:1;overflow-y:auto;background:#111b21;}
  .user-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #1f2c34;cursor:pointer;gap:12px;position:relative;}
  .user-item:active{background:#1f2c34;}
  .user-item.has-new .user-phone{color:#25d366;font-weight:700;}
  .u-avatar{width:46px;height:46px;border-radius:50%;background:#2a3942;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#00a884;flex-shrink:0;}
  .u-info{flex:1;min-width:0;}
  .user-phone{font-size:15px;font-weight:600;color:#e9edef;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-preview{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .u-meta{text-align:right;flex-shrink:0;}
  .u-time{font-size:11px;color:#8696a0;}
  .new-dot{width:18px;height:18px;background:#00a884;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-top:4px;margin-left:auto;}
  .empty-list{text-align:center;padding:40px;color:#8696a0;font-size:14px;}
  .delete-hint{font-size:10px;color:#8696a0;text-align:center;padding:8px;background:#111b21;}
  #chatView{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .chat-top{background:#1f2c34;padding:10px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:56px;}
  .back-btn{background:none;border:none;color:#00a884;font-size:22px;cursor:pointer;padding:0 4px;}
  .chat-user-phone{font-size:15px;font-weight:600;color:#e9edef;}
  .chat-user-sub{font-size:12px;color:#8696a0;}
  .messages-area{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:4px;background:#0b141a;}
  .msg-row{display:flex;margin-bottom:2px;}
  .msg-row.sent{justify-content:flex-end;}
  .msg-row.received{justify-content:flex-start;}
  .msg-bubble{max-width:78%;padding:7px 12px 20px;border-radius:8px;position:relative;word-wrap:break-word;font-size:15px;line-height:1.4;cursor:pointer;user-select:none;}
  .msg-row.sent .msg-bubble{background:#005c4b;border-radius:8px 0 8px 8px;color:#e9edef;}
  .msg-row.received .msg-bubble{background:#1f2c34;border-radius:0 8px 8px 8px;color:#e9edef;}
  .msg-bubble.unsent{background:transparent!important;border:1px dashed #374045;color:#8696a0;font-style:italic;padding:7px 12px;}
  .msg-time{position:absolute;bottom:4px;right:10px;font-size:11px;color:#8696a0;}
  .date-divider{text-align:center;margin:10px 0;}
  .date-divider span{background:#1f2c34;color:#8696a0;font-size:12px;padding:4px 12px;border-radius:20px;}
  .input-area{background:#1f2c34;padding:8px 10px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;min-height:60px;}
  .msg-input-wrap{flex:1;background:#2a3942;border-radius:24px;display:flex;align-items:flex-end;padding:8px 14px;min-height:46px;}
  .msg-input{flex:1;background:none;border:none;color:#e9edef;font-size:16px;outline:none;resize:none;max-height:120px;line-height:1.4;padding:0;font-family:'Segoe UI',sans-serif;}
  .msg-input::placeholder{color:#8696a0;}
  .send-btn{width:46px;height:46px;border-radius:50%;background:#00a884;border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;justify-content:center;align-items:center;flex-shrink:0;}
  .hidden{display:none!important;}
  .loading{text-align:center;padding:20px;color:#8696a0;font-size:14px;}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1f2c34;color:#e9edef;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;border:1px solid #374045;}
  .ctx-menu{position:fixed;background:#1f2c34;border:1px solid #374045;border-radius:12px;padding:8px 0;z-index:999;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
  .ctx-item{padding:12px 20px;font-size:14px;cursor:pointer;color:#e9edef;}
  .ctx-item:active{background:#2a3942;}
  .ctx-item.danger{color:#f15c6d;}
  .ctx-overlay{position:fixed;inset:0;z-index:998;}
</style>
</head>
<body>

<!-- ADMIN LOGIN -->
<div id="adminLogin" style="display:flex;">
  <div class="admin-logo">🛡️</div>
  <div class="admin-badge">ADMIN PANEL</div>
  <div class="auth-card">
    <h2>Admin Login</h2>
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="adminUser" placeholder="Username">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="Password">
      <button class="eye-btn" onclick="toggleEye('adminPass',this)">👁️</button>
    </div>
    <div class="auth-err" id="adminErr"></div>
    <button class="auth-btn" onclick="doAdminLogin()">Login</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden" style="display:flex;">

  <!-- USERS LIST -->
  <div id="usersView" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="top-bar">
      <div class="top-title">🛡️ Admin Panel</div>
      <div class="top-right">
        <a class="wa-btn" href="https://wa.me/254734081951?text=Hello!%20I'd%20like%20this%20Programme." target="_blank">📱 WhatsApp</a>
        <button class="logout-btn" onclick="adminLogout()">Logout</button>
      </div>
    </div>
    <div class="delete-hint">Long press a user to delete</div>
    <div id="usersList"><div class="loading">Loading users...</div></div>
  </div>

  <!-- CHAT VIEW -->
  <div id="chatView" class="hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="chat-top">
      <button class="back-btn" onclick="backToList()">←</button>
      <div id="chatAvatar" style="width:36px;height:36px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;">U</div>
      <div style="margin-left:10px;">
        <div class="chat-user-phone" id="chatPhone">User</div>
        <div class="chat-user-sub">Admin chat</div>
      </div>
    </div>
    <div class="messages-area" id="adminMsgs">
      <div class="loading">Loading chat...</div>
    </div>
    <div class="input-area">
      <div class="msg-input-wrap">
        <textarea class="msg-input" id="adminInput" placeholder="Type a message" rows="1" onInput="autoResize(this)" onkeydown="handleAdminKey(event)"></textarea>
      </div>
      <button class="send-btn" onclick="adminSend()">➤</button>
    </div>
  </div>

</div>

<div id="toastEl" class="toast hidden"></div>
<div id="ctxOverlay" class="ctx-overlay hidden" onclick="closeCtx()"></div>
<div id="ctxMenu" class="ctx-menu hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
  authDomain: "african-enterprise-challenge-f.firebaseapp.com",
  projectId: "african-enterprise-challenge-f",
  storageBucket: "african-enterprise-challenge-f.firebasestorage.app",
  messagingSenderId: "85146331644",
  appId: "1:85146331644:web:b28599e0c8b75498fe6a79",
  measurementId: "G-6C670QY54S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
window.fbM = { collection, doc, setDoc, getDocs, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, deleteDoc };

if(localStorage.getItem('adminLoggedIn')==='yes'){ showAdminPanel(); }

window.doAdminLogin = function(){
  const user = document.getElementById('adminUser').value.trim();
  const pass = document.getElementById('adminPass').value;
  const err = document.getElementById('adminErr');
  err.textContent = '';
  if(user==='Kibet Davis' && pass==='Kwenik254$'){
    localStorage.setItem('adminLoggedIn','yes');
    showAdminPanel();
  } else {
    err.textContent = 'Invalid username or password';
  }
};

function showAdminPanel(){
  document.getElementById('adminLogin').classList.add('hidden');
  document.getElementById('adminLogin').style.display='none';
  document.getElementById('adminPanel').classList.remove('hidden');
  document.getElementById('adminPanel').style.display='flex';
  loadUsers();
}

window.adminLogout = function(){
  if(!confirm('Logout?')) return;
  localStorage.removeItem('adminLoggedIn');
  if(window.unsubUsers) window.unsubUsers();
  if(window.unsubChat) window.unsubChat();
  document.getElementById('adminLogin').classList.remove('hidden');
  document.getElementById('adminLogin').style.display='flex';
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('adminPanel').style.display='none';
};

window.loadUsers = function(){
  const {collection,onSnapshot}=window.fbM;
  if(window.unsubUsers) window.unsubUsers();
  window.unsubUsers=onSnapshot(collection(db,'users'),(snap)=>{
    const users=snap.docs.map(d=>({id:d.id,...d.data()}));
    users.sort((a,b)=>{
      const ta=a.lastTime?.toDate?.()?.getTime()||0;
      const tb=b.lastTime?.toDate?.()?.getTime()||0;
      return tb-ta;
    });
    renderUsers(users);
  });
};

function renderUsers(users){
  const list=document.getElementById('usersList');
  if(users.length===0){
    list.innerHTML='<div class="empty-list">No users yet.<br>They will appear here when they sign up.</div>';
    return;
  }
  list.innerHTML='';
  users.forEach(u=>{
    const phone=u.phone||u.id;
    const div=document.createElement('div');
    div.className='user-item'+(u.hasNew?' has-new':'');
    const ts=u.lastTime?.toDate?.();
    const timeStr=ts?ts.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}):'';
    div.innerHTML=`
      <div class="u-avatar">${escHtml(phone.charAt(0))}</div>
      <div class="u-info">
        <div class="user-phone">${escHtml(phone)}</div>
        <div class="user-preview">${escHtml(u.lastMessage||'No messages yet')}</div>
      </div>
      <div class="u-meta">
        <div class="u-time">${timeStr}</div>
        ${u.hasNew?'<div class="new-dot">●</div>':''}
      </div>`;
    div.onclick=()=>openChat(phone);
    let pressTimer;
    div.addEventListener('touchstart',()=>{pressTimer=setTimeout(()=>showUserCtx(phone,div),600);},{passive:true});
    div.addEventListener('touchend',()=>clearTimeout(pressTimer));
    div.addEventListener('touchmove',()=>clearTimeout(pressTimer));
    div.addEventListener('mousedown',()=>{pressTimer=setTimeout(()=>showUserCtx(phone,div),600);});
    div.addEventListener('mouseup',()=>clearTimeout(pressTimer));
    list.appendChild(div);
  });
}

window.showUserCtx = function(phone,el){
  const menu=document.getElementById('ctxMenu');
  const overlay=document.getElementById('ctxOverlay');
  menu.innerHTML=`
    <div class="ctx-item danger" onclick="deleteUser('${escHtml(phone)}')">🗑️ Delete User</div>
    <div class="ctx-item" onclick="closeCtx()">Cancel</div>`;
  const rect=el.getBoundingClientRect();
  menu.style.top=(rect.bottom+4)+'px';
  menu.style.left='50%';
  menu.style.transform='translateX(-50%)';
  menu.classList.remove('hidden');
  overlay.classList.remove('hidden');
};

window.closeCtx=()=>{
  document.getElementById('ctxMenu').classList.add('hidden');
  document.getElementById('ctxOverlay').classList.add('hidden');
};

window.deleteUser = async function(phone){
  closeCtx();
  if(!confirm(`Delete user ${phone} and all their messages?`)) return;
  try{
    const {collection,getDocs,deleteDoc,doc}=window.fbM;
    const msgsSnap=await getDocs(collection(db,'chats',phone,'messages'));
    for(const m of msgsSnap.docs) await deleteDoc(m.ref);
    await deleteDoc(doc(db,'users',phone));
    showToast('User deleted ✓');
  }catch(e){showToast('Error: '+e.message);}
};

window.currentChatPhone=null;

window.openChat = async function(phone){
  window.currentChatPhone=phone;
  document.getElementById('usersView').style.display='none';
  document.getElementById('chatView').classList.remove('hidden');
  document.getElementById('chatView').style.display='flex';
  document.getElementById('chatPhone').textContent=phone;
  document.getElementById('chatAvatar').textContent=phone.charAt(0);
  try{
    const {doc,updateDoc}=window.fbM;
    await updateDoc(doc(db,'users',phone),{hasNew:false});
  }catch(e){}
  loadAdminChat(phone);
};

window.backToList=function(){
  if(window.unsubChat) window.unsubChat();
  document.getElementById('chatView').classList.add('hidden');
  document.getElementById('chatView').style.display='none';
  document.getElementById('usersView').style.display='flex';
  window.currentChatPhone=null;
};

window.loadAdminChat=function(phone){
  const {collection,query,orderBy,onSnapshot}=window.fbM;
  const q=query(collection(db,'chats',phone,'messages'),orderBy('timestamp','asc'));
  document.getElementById('adminMsgs').innerHTML='<div class="loading">Loading...</div>';
  if(window.unsubChat) window.unsubChat();
  window.unsubChat=onSnapshot(q,(snap)=>{
    renderAdminMsgs(snap.docs.map(d=>({id:d.id,...d.data()})));
  });
};

window.renderAdminMsgs=function(msgs){
  const area=document.getElementById('adminMsgs');
  let lastDate='';
  area.innerHTML='';
  if(msgs.length===0){area.innerHTML='<div class="loading">No messages yet.</div>';return;}
  msgs.forEach(m=>{
    const ts=m.timestamp?.toDate?m.timestamp.toDate():new Date(m.timestamp||Date.now());
    const dateStr=ts.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'});
    if(dateStr!==lastDate){
      lastDate=dateStr;
      area.innerHTML+=`<div class="date-divider"><span>${dateStr}</span></div>`;
    }
    const isSent=m.sender==='admin';
    const timeStr=ts.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'});
    const unsentClass=m.unsent?'unsent':'';
    const displayText=m.unsent?'🚫 Message unsent':escHtml(m.text||'');
    const div=document.createElement('div');
    div.className=`msg-row ${isSent?'sent':'received'}`;
    div.innerHTML=`<div class="msg-bubble ${unsentClass}" data-id="${m.id}">
      ${displayText}
      <span class="msg-time">${timeStr}</span>
    </div>`;
    if(isSent&&!m.unsent){
      let lastTap=0;
      div.querySelector('.msg-bubble').addEventListener('touchend',()=>{
        const now=Date.now();
        if(now-lastTap<400){ adminUnsend(m.id); }
        lastTap=now;
      });
      div.querySelector('.msg-bubble').addEventListener('dblclick',()=>adminUnsend(m.id));
    }
    area.appendChild(div);
  });
  area.scrollTop=area.scrollHeight;
};

window.adminUnsend=async function(msgId){
  if(!window.currentChatPhone||!msgId) return;
  if(!confirm('Unsend this message?')) return;
  try{
    const {doc,updateDoc}=window.fbM;
    await updateDoc(doc(db,'chats',window.currentChatPhone,'messages',msgId),{unsent:true,text:''});
    showToast('Message unsent ✓');
  }catch(e){showToast('Error: '+e.message);}
};

window.adminSend=async function(){
  const input=document.getElementById('adminInput');
  const text=input.value.trim();
  if(!text||!window.currentChatPhone) return;
  input.value='';input.style.height='auto';
  const {collection,addDoc,serverTimestamp,doc,updateDoc}=window.fbM;
  try{
    await addDoc(collection(db,'chats',window.currentChatPhone,'messages'),{
      text,sender:'admin',timestamp:serverTimestamp(),unsent:false
    });
    await updateDoc(doc(db,'users',window.currentChatPhone),{lastMessage:'Admin: '+text,lastTime:serverTimestamp()});
    showToast('Sent ✓');
  }catch(e){showToast('Error: '+e.message);}
};
</script>

<script>
function toggleEye(inputId,btn){
  const inp=document.getElementById(inputId);
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁️';}
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function handleAdminKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();adminSend();}}
function escHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function showToast(msg){
  const t=document.getElementById('toastEl');
  t.textContent=msg;t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),3000);
}
</script>
</body>
</html>
