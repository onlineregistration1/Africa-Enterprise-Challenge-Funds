<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#075e54;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

#loginBox{
max-width:420px;
margin:40px auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#25d366;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

#chatList{
display:none;
flex:1;
overflow:auto;
background:#fff;
}

.userItem{
padding:15px;
border-bottom:1px solid #ddd;
font-size:17px;
cursor:pointer;
background:#fff;
}

.userItem:hover{
background:#f5f5f5;
}

#error{
color:red;
text-align:center;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
Admin Panel
</div>

<div id="loginBox">

<input
id="adminUser"
placeholder="Username">

<input
type="password"
id="adminPass"
placeholder="Password">

<button id="adminLogin">
Login
</button>

<div id="error"></div>

</div>

<div id="chatList"></div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const USERNAME="Kibet Davis";
const PASSWORD="Kwenik254$";

document.getElementById("adminLogin").onclick=async()=>{

const u=document.getElementById("adminUser").value.trim();
const p=document.getElementById("adminPass").value;

if(u!==USERNAME || p!==PASSWORD){

document.getElementById("error").innerHTML="Wrong Username or Password";

return;

}

document.getElementById("loginBox").style.display="none";

document.getElementById("chatList").style.display="block";

const users=await getDocs(collection(db,"users"));

const list=document.getElementById("chatList");

list.innerHTML="";

users.forEach((doc)=>{

const div=document.createElement("div");

div.className="userItem";

div.innerHTML="📱 "+doc.id;

div.onclick=()=>{

location.href="admin-chat.html?user="+doc.id;

};

list.appendChild(div);

});

};

</script>

</body>
</html>
