<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#075e54;
color:white;
padding:14px;
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:18px;
}

.back{
background:white;
color:#075e54;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.phone{
flex:1;
}

.chatArea{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

.userMsg{

background:#dcf8c6;
padding:10px 14px;
border-radius:12px;
margin-bottom:12px;
align-self:flex-start;
max-width:80%;
word-wrap:break-word;

}

.adminMsg{

background:white;
padding:10px 14px;
border-radius:12px;
margin-bottom:12px;
align-self:flex-end;
max-width:80%;
word-wrap:break-word;

}

.bottom{

background:white;
padding:10px;
display:flex;
gap:8px;

}

.bottom input{

flex:1;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:25px;

}

.bottom button{

background:#25d366;
color:white;
border:none;
padding:12px 18px;
border-radius:25px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="header">

<button
class="back"
onclick="history.back()">
←
</button>

<div
class="phone"
id="phoneTitle">
Loading...
</div>

</div>

<div
class="chatArea"
id="chatArea">

</div>

<div class="bottom">

<input
id="message"
placeholder="Reply...">

<button
id="send">
Send
</button>

</div>

<script type="module">

import { db } from "./firebase.js";

import{
collection,
query,
orderBy,
onSnapshot,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const params=new URLSearchParams(location.search);

const phone=params.get("user");

document.getElementById("phoneTitle").innerHTML=phone;

const chatArea=document.getElementById("chatArea");

const messagesRef=collection(db,"chats",phone,"messages");

function bubble(text,isAdmin){

const div=document.createElement("div");

div.className=isAdmin?"adminMsg":"userMsg";

div.innerHTML=text;

chatArea.appendChild(div);

chatArea.scrollTop=chatArea.scrollHeight;

}

const q=query(messagesRef,orderBy("time"));

onSnapshot(q,(snap)=>{
// ---------- Send Admin Message ----------

const input = document.getElementById("message");
const send = document.getElementById("send");

send.onclick = async () => {

const text = input.value.trim();

if(text==="") return;

await addDoc(messagesRef,{
sender:"admin",
text:text,
time:serverTimestamp(),
unsent:false
});

input.value="";

};

// Press Enter to Send

input.addEventListener("keypress",async(e)=>{

if(e.key==="Enter"){

send.click();

}

});
