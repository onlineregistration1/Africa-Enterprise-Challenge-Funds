<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#075e54;
color:white;
padding:12px;
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.back{
background:white;
color:#075e54;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.phone{
flex:1;
}

.chatArea{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.userMsg{
background:#dcf8c6;
padding:10px;
border-radius:12px;
align-self:flex-start;
max-width:80%;
}

.adminMsg{
background:white;
padding:10px;
border-radius:12px;
align-self:flex-end;
max-width:80%;
}

.bottom{
display:flex;
padding:10px;
gap:8px;
background:white;
}

.bottom input{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
}

.bottom button{
background:#25d366;
color:white;
border:none;
padding:12px 18px;
border-radius:25px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<button class="back" onclick="history.back()">←</button>
<div class="phone" id="phoneTitle">Loading...</div>
</div>

<div class="chatArea" id="chatArea"></div>

<div class="bottom">
<input id="message" placeholder="Type reply...">
<button id="sendBtn">Send</button>
</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
query,
orderBy,
onSnapshot,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

// GET USER PHONE
const params = new URLSearchParams(location.search);
const phone = params.get("user");

document.getElementById("phoneTitle").innerText = phone;

// CHAT AREA
const chatArea = document.getElementById("chatArea");
const input = document.getElementById("message");
const sendBtn = document.getElementById("sendBtn");

// FIRESTORE PATH
const messagesRef = collection(db,"chats",phone,"messages");

// SHOW MESSAGE
function showMsg(text,sender){

const div = document.createElement("div");

div.className = sender==="admin" ? "adminMsg" : "userMsg";

div.textContent = text;

chatArea.appendChild(div);

chatArea.scrollTop = chatArea.scrollHeight;
}

// REAL TIME LISTENER
const q = query(messagesRef, orderBy("time"));

onSnapshot(q,(snap)=>{

chatArea.innerHTML="";

snap.forEach(doc=>{

const data = doc.data();

showMsg(data.text,data.sender);

});

});

// SEND MESSAGE (FIXED)
sendBtn.addEventListener("click", async ()=>{

const text = input.value.trim();
if(!text) return;

await addDoc(messagesRef,{
text:text,
sender:"admin",
time:serverTimestamp()
});

input.value="";
});

// ENTER KEY SUPPORT
input.addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
sendBtn.click();
}
});

</script>

</body>
</html>
